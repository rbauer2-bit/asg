# ─────────────────────────────────────────
# COMPLIANCE FLAGS (KY specific)
# ─────────────────────────────────────────
compliance:
  state: "Kentucky"
  bar_rules_key_notes:
    - "Kentucky Bar Association Rules of Professional Conduct apply. Rule 7.2 — Advertising. Rule 7.3 — Direct contact with prospective clients."
    - "Cannot guarantee case outcomes. All content must use 'may', 'can', 'in our experience', 'results vary' framing."
    - "Testimonials require client consent in writing. Anonymized case references do not require consent."
    - "Referral fee arrangements with non-attorneys are prohibited under KY Rules. Referral program uses non-financial recognition only (thank you gifts, charitable donation in client's name)."
    - "All email marketing to past clients must include opt-out mechanism and clearly identify Aleksander Law Office, PLLC."
    - "Cannot solicit clients currently represented by another attorney."
    - "All content must include: 'This content is for informational purposes only and does not constitute legal advice.'"
    - "'Best' and 'Top-Rated' claims must be qualified: 'As recognized by [org name] in [year]' not as standalone superlatives."

  pi_specific:
    - "No specific settlement amount claims without prominent disclaimer that results vary and past results don't guarantee future outcomes."

