  avoid_words: ["collaborative", "gentle", "peaceful", "amicable", "non-adversarial"]
  preferred_framing:
    - "Fight for what you deserve" (not "guide you through")
    - "Protect your interests" (not "facilitate a resolution")
    - "15 years in Louisville courts" (not "experienced attorney")
    - "I know how this works in Jefferson County" (not "we handle family law matters")
    - "I will tell you the truth about your case" (not "we'll work toward the best outcome")
  communication_style_notes: >
    Rachelle's practice is built on being the attorney clients call when the situation
    is hard, the other side is playing games, and they need someone who won't flinch.
    Content should reflect that earned confidence — direct, honest, and unafraid to
    tell a prospective client what the situation actually looks like. Not aggressive
    for the sake of it, but genuinely committed to outcomes, not process.
  client_testimonial_themes:
    - "She didn't back down when the other side got aggressive"
    - "She told me the truth even when it wasn't what I wanted to hear"
    - "She knew the Louisville courts and it showed"
    - "I felt like she actually cared about my outcome, not just closing the case"
    - "She fought for what I deserved"

