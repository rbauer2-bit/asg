# ─────────────────────────────────────────
# COMPLIANCE FLAGS (Kentucky Bar / ABA)
# ─────────────────────────────────────────
compliance_flags:
  - "Kentucky Bar Association advertising rules apply to all content and marketing. Review KBA SCR 3.130 (7.1–7.5) before publishing."
  - "Cannot guarantee case outcomes. All content must use 'may', 'can', 'in our experience' framing."
  - "Testimonials must be real clients who have provided written consent. No fabricated case results."
  - "Cannot solicit clients currently represented by another attorney."
  - "'Specialist' or 'expert' designations are restricted — avoid unless KBA-certified."
  - "Referral arrangements with non-attorneys must be non-financial (no fee splitting)."
  - "All content must include: 'This content is for informational purposes only and does not constitute legal advice.'"
  - "Email marketing to past clients is permissible but must include opt-out and firm identification."
  - "Google review responses must not confirm representation or disclose case details (KBA Rule 1.6)."

