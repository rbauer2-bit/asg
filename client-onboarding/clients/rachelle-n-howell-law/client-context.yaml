# ─────────────────────────────────────────
# COMPETITIVE LANDSCAPE
# ─────────────────────────────────────────
competitive_landscape:
  market_context: >
    Louisville's family law market has clear tiers. Large firms (Dolt Thompson, Goldberg Simpson)
    have resources and brand recognition but are expensive, often impersonal, and sometimes more
    interested in efficient resolution than maximum client outcome. Solo and small practitioners
    are accessible and cost-effective but often lack the litigation depth for complex or contested
    cases. Rachelle's position: 15-year Louisville veteran, willing to litigate, experienced in
    contested matters — competitive against both categories for the client who needs a fighter.

  top_competitors:
    - name: "Dolt Thompson Shepherd & Conway, PSC"
      website: "https://www.doltthompson.com"
      strengths: ["Louisville brand recognition", "Large team", "Resources for complex cases"]
      weaknesses:
        - "Expensive — premium rates that may not fit middle-market clients"
        - "Large firm = client handed off; less personal attention"
        - "Volume throughput incentivizes efficient settlement over maximum outcome"
        - "Impersonal — hard to reach the senior attorney when you need them"
      positioning_gap: "Rachelle can compete on personal attention + comparable experience at a more accessible price point"

    - name: "Goldberg Simpson, LLC"
      website: "https://www.goldbergsimpson.com"
      strengths: ["Established Louisville reputation", "Broad family law coverage", "Strong marketing"]
      weaknesses:
        - "Generalist large-firm experience; lower intensity for individual cases"
        - "Premium pricing; clients at mid-market level may feel underserved"
        - "Client experience is institutional, not personal"
      positioning_gap: "Rachelle's direct involvement and 15-year Louisville litigation record as a personal commitment"

    - name: "Lawrence & Lawrence Attorneys"
      website: ""
      strengths: ["Local Louisville presence", "Established referral network"]
      weaknesses:
        - "Limited digital authority presence"
        - "No specific positioning around litigation capability or case complexity"
      positioning_gap: "Rachelle's explicit positioning around contested cases and willingness to litigate"

    - name: "Online Divorce Platforms (Hello Divorce, LegalZoom, Wevorce)"
      website: ""
      strengths: ["Low cost", "Fast for uncontested cases"]
      weaknesses:
        - "Zero legal judgment or representation — templates only"
        - "No ability to handle contested matters, custody disputes, or complex assets"
        - "Clients who start here often need an attorney later, at higher cost"
      positioning_gap: "Not a real competitor for Rachelle's contested/complex case avatar"

  market_positioning_gap: >
    The Louisville client who specifically needs an experienced, aggressive advocate —
    not a firm that will push them toward the fastest settlement — has difficulty
    identifying which attorney will actually fight for them. Rachelle's 15-year record
    and litigation-forward positioning fills that gap directly.

  recommended_positioning: >
    "Louisville's most experienced family law attorney for clients who need someone
    who will fight — in negotiation, in mediation, and in court."

  authority_gaps:
    - "No Louisville family law attorney has built consistent content around what aggressive, experienced representation actually looks like in Jefferson County courts"
    - "Nobody is publishing content that speaks to the client facing a combative opposing attorney — a very real, very anxious Louisville prospect"
    - "Local SEO for contested/high-asset terms ('contested divorce attorney Louisville', 'divorce attorney Jefferson County') is underdeveloped"
    - "Rachelle's 15-year track record has no digital expression — invisible to prospects who didn't receive a personal referral"

  differentiators:
    - "15-year Louisville track record in contested, complex family law — experience no new entrant can replicate"
    - "Willing to litigate — not a settlement-first attorney; fights when fighting is the right strategy"
    - "Downtown Louisville location — professional, accessible, established"
    - "Personal representation — not handed off to a junior associate"
    - "Knows Jefferson County courts, judges, and opposing counsel"

# ─────────────────────────────────────────
# FAST CASH SPRINT™ PRIORITIES
# ─────────────────────────────────────────
fast_cash_priorities:
  - rank: 1
    strategy_name: "Digital Trust Sprint — HTTPS Migration + Google Business Profile + Review Generation"
    strategy_reference: "Strategy 19 (Local SEO) + Reputation infrastructure"
    rationale: >
      Priority 0 — prerequisite for everything else. 10+ one-star reviews and a non-secure
      website are functioning as a veto mechanism for every prospect who searches Rachelle's
      name. A client about to hand over a significant retainer for a contested case will not
      engage with an attorney whose first digital impression raises doubt. Fixing HTTPS takes
      hours. Generating new reviews from 15 years of satisfied clients takes 30 days.
      The conversion improvement from repairing these signals is the fastest revenue lever available.
    estimated_revenue_impact: "$15k–$30k in recovered conversions (conservative: 1–2 additional clients/month from improved trust signals)"
    implementation_timeline: "Days 1–30 (HTTPS: days 1–3; GBP optimization: days 3–7; review generation: days 7–30)"
    required_assets:
      - "Website hosting provider access (for SSL certificate installation)"
      - "Google Business Profile owner access"
      - "Past or recent client contact list for review generation outreach"
      - "Rachelle approval of review request messaging"
    compliance_notes: "Reviews must be real clients. No incentives. Review responses must comply with KBA Rule 1.6 — cannot confirm representation or disclose case details."

  - rank: 2
    strategy_name: "Wake the 15-Year List — Past Client Reactivation & Referral Sequence"
    strategy_reference: "Strategy 1 + 12 (Wake Past Clients + Bring Back Sooner)"
    rationale: >
      Fifteen years of closed cases represents an estimated 300–500 past clients who
      already know Rachelle's work. Many have new legal needs: custody modifications,
      support adjustments, enforcement matters, non-compliance by an ex-spouse.
      A 3-touch reactivation sequence — informative, not promotional — should generate
      5–10 new matters in 30–45 days from a list she already owns. The trust is
      pre-established. The cost of acquisition is near zero.
    estimated_revenue_impact: "$30k–$60k (3–6 matters at avg $10,000)"
    implementation_timeline: "Days 7–45 (launch after HTTPS secured)"
    required_assets:
      - "Past client contact list with email addresses"
      - "Email platform or willingness to set one up"
      - "Rachelle approval of reactivation sequence copy before send"
    compliance_notes: "KBA allows email to past clients. Must include opt-out and firm identification. Cannot contact clients currently represented by another attorney."

  - rank: 3
    strategy_name: "Professional Referral Network — Attorneys, CPAs & Financial Advisors"
    strategy_reference: "Strategy 11 (Partner Marketing)"
    rationale: >
      Attorneys in other practice areas (estate planning, business law, criminal defense,
      personal injury) regularly encounter clients who need family law representation —
      and refer out. CPAs and financial advisors in Louisville work with clients navigating
      complex divorces involving business assets, retirement accounts, and real estate.
      These professionals want a trusted family law referral who can handle complexity and
      won't back down. Rachelle's contested case expertise and 15-year Louisville track record
      is exactly what they're looking for. A systematic outreach to 30–50 Louisville-area
      attorneys and financial professionals can generate 4–8 referral relationships and
      3–6 new matters within 60 days.
    estimated_revenue_impact: "$30k–$60k (3–6 new matters at avg $10,000)"
    implementation_timeline: "Days 14–60"
    required_assets:
      - "Rachelle availability for 3–5 intro calls or meetings"
      - "One-page referral brief (ASG will produce): Rachelle's case profile and referral protocol"
      - "Target list: Louisville attorneys (estate, business, PI, criminal) + CPAs + financial advisors"
    compliance_notes: "Attorney-to-attorney referrals under KBA rules require disclosure of any fee arrangement. Non-attorney referral sources (CPAs, financial advisors) must be non-financial arrangements only."

