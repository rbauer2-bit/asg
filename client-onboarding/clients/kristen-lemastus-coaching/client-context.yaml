# ─────────────────────────────────────────
# COMPETITIVE LANDSCAPE
# ─────────────────────────────────────────
competitive_landscape:
  market_context: |
    Louisville's executive and leadership coaching market is fragmented and largely
    invisible from a marketing standpoint. Most coaches rely on referrals only, have
    minimal digital presence, and position generically. The primary competitive threats
    for Kristen are: (1) national coaching platforms her target companies already subscribe
    to; (2) local L&D consultants who offer team-level work; (3) individual ICF-certified
    coaches with limited corporate experience.

  named_competitors:
    - name: "BetterUp (National Platform)"
      positioning: "Enterprise coaching platform — 'human transformation at scale.' Subscribed to by large Louisville employers for broad leader populations."
      strengths: "Scale, brand recognition, algorithmic matching, corporate buying relationships"
      key_weakness: "Impersonal — coaches are matched algorithmically, not chosen. No Louisville market knowledge. Zero personal relationship with the client's specific culture or challenges. Feels like HR software."
      authority_grades:
        website_clarity: "Strong"
        review_volume: "Absent (platform reviews, not personal)"
        content_education: "Moderate"
        local_search_visibility: "Absent"
        referral_network: "Corporate contracts only"

    - name: "Louisville L&D Consulting (OBJ & Associates / similar HR consulting firms)"
      positioning: "HR and organizational development consulting with coaching as a service component"
      strengths: "Established corporate relationships, HR credibility, can bundle services"
      key_weakness: "Coaching is secondary to their HR consulting; not a specialist. No personal executive coaching depth. Known more for compliance training than transformational leadership work."
      authority_grades:
        website_clarity: "Moderate"
        review_volume: "Weak"
        content_education: "Absent"
        local_search_visibility: "Weak"
        referral_network: "Moderate (HR networks)"

    - name: "Individual ICF-Certified Coaches (Louisville active on coach directories)"
      positioning: "Certified coaches emphasizing credentialing (ICF ACC/PCC) and coaching methodology"
      strengths: "Credentialing is recognized, often lower price point, some referral relationships"
      key_weakness: "Positioned on process (how they coach) rather than outcomes. Minimal corporate L&D background — coaching theory without organizational reality. Generic positioning: 'I help leaders unlock their potential' applies to everyone and no one."
      authority_grades:
        website_clarity: "Weak"
        review_volume: "Weak"
        content_education: "Absent"
        local_search_visibility: "Weak"
        referral_network: "Weak"

  competitive_gap_summary: |
    None of the primary competitors in the Louisville coaching and leadership development
    market currently occupies the position of "the coach who has actually done the job
    inside organizations." BetterUp wins on scale but loses on humanity. HR consulting
    firms win on corporate relationships but lack coaching depth. Individual coaches win
    on process credentialing but lack real-world organizational credibility.
    The position of "Louisville's enterprise-tested executive and leadership coach" —
    the one who built programs, sat with senior leaders, and transformed cultures from
    the inside before coaching from the outside — is available and uncontested.

  kristen_competitive_advantages:
    - "20 years of enterprise-level L&D experience — has actually built the programs she now coaches around"
    - "Has consulted with senior leaders directly — understands organizational politics from the inside"
    - "Can serve BOTH individual executives AND organizational teams — rare dual capability"
    - "Louisville-based in a fragmented market — local presence beats remote-only coaches for many clients"
    - "Authentic personal brand — her LinkedIn voice shows genuine warmth, conviction, and real point of view"

  market_positioning_gap: |
    No coach in the Louisville market currently positions with the combination of
    enterprise L&D credibility, personal executive coaching depth, AND organizational
    team development capability. Kristen's 20-year insider track is an asset no
    competitor can replicate by simply updating their website.

