# ─────────────────────────────────────────
# COMPLIANCE FLAGS (Coaching-specific)
# ─────────────────────────────────────────
compliance:
  industry: "Professional Coaching"
  governing_body: "ICF (International Coaching Federation) ethical standards apply if certified"
  key_notes:
    - "Cannot guarantee coaching outcomes. All content uses 'many clients experience', 'clients often find', 'in my work with leaders' framing."
    - "Coaching is distinct from therapy. If messaging inadvertently implies therapeutic services, revise. Add 'Coaching is not a substitute for licensed therapeutic or clinical services.'"
    - "Testimonials and case studies require client consent. Anonymized case references do not require consent but must not be identifiable."
    - "Credential claims must be accurate. If ICF certified: state certification level (ACC/PCC/MCC). If not yet certified: do not imply certification."
    - "Email marketing must include opt-out mechanism and accurate sender identification (Kristen LeMastus Coaching & Consulting)."
    - "ROI claims must be qualified: 'results vary based on client engagement, commitment, and context.'"

