brand_voice:
  core_tone: "Warm, energetic, direct. High conviction about human potential. Speaks in outcomes and observations, not jargon. Believes deeply in people before process."
  self_described: "Strategic insight + practical tools + human connection. Guided by positivity, communication, taking action."

  voice_descriptors:
    - "The experienced practitioner who has sat inside organizations and knows how it really works"
    - "Genuine warmth — cares about people, not just performance"
    - "Action-oriented — moves from insight to 'here's what you do with it' fast"
    - "Honest without being harsh — tells the truth in a way that energizes, not deflates"

  client_language_they_use:
    - "I feel like I've plateaued and I don't know why"
    - "I know what I should do but I can't seem to make myself do it"
    - "My team isn't performing and I'm not sure if it's them or me"
    - "I need someone who actually gets what corporate life is like"
    - "I've been leading by doing what I thought I was supposed to do, not what feels right"

  avoid:
    - "Buzzword soup (authentic, impactful, synergy, leverage your potential)"
    - "Coaching-industry jargon without plain-English translation"
    - "Overpromising transformation timelines ('10x your leadership in 90 days')"
    - "Generic inspirational language that could come from any coach anywhere"

