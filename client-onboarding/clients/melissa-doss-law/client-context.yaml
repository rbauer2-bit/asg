# BRAND VOICE (Melissa Doss Law)
# ─────────────────────────────────────────
brand_voice:
  overall_tone: "Warm, clear, confident, empowering — never adversarial"
  personality_words: ["collaborative", "trustworthy", "clear", "protective", "grounded"]
  avoid_words: ["fight", "battle", "war", "win", "destroy", "attack"]
  preferred_framing:
    - "Guide you through" (not "fight for you")
    - "Protect what matters most" (not "win your case")
    - "Your next chapter" (not "getting through the divorce")
    - "Your children's stability" (not "custody victory")
  communication_style_notes: >
    Melissa's natural voice is warm and direct. She explains things clearly.
    She doesn't weaponize fear the way adversarial attorneys do. Content should
    speak to women where they are — not lecture them, not scare them, not talk
    down to them. It should feel like getting advice from a smart, experienced friend
    who happens to know family law exceptionally well.
  client_testimonial_themes:
    - "She actually listened"
    - "She made a terrifying situation feel manageable"
    - "She was honest with me even when I didn't want to hear it"
    - "My kids came first in everything she did"

