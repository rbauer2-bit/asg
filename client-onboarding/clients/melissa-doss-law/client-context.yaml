# ─────────────────────────────────────────
# COMPETITIVE LANDSCAPE
# ─────────────────────────────────────────
competitive_landscape:
  market_context: >
    The NKY family law market is served by three primary competitor categories.
    Large Cincinnati-based firms that reach across the Ohio River dominate brand
    recognition but are perceived as expensive and impersonal. Local NKY solo and
    small-firm practitioners are scattered but rarely create content or build authority
    presence. Online divorce platforms (LegalZoom, HelloDivorce) are capturing the
    uncontested segment. Melissa sits at a genuine competitive white space: a credentialed,
    11-year NKY firm with team depth, a collaborative philosophy, and a women-centered focus
    — that has never systematically told that story.

  top_competitors:
    - name: "Large Cincinnati-Based Family Law Firms with NKY Reach"
      strengths: ["Brand recognition in the metro", "Large teams and resources", "Heavy advertising presence"]
      weaknesses:
        - "Perceived as impersonal and expensive by NKY residents"
        - "No specific positioning for collaborative or women-focused divorce"
        - "Ohio-centric — limited NKY-specific knowledge signal"
        - "Volume-driven; clients feel like a file number"
      positioning_gap: "Melissa can position as 'your Northern Kentucky attorney' vs. 'a Cincinnati firm with a NKY satellite'"

    - name: "NKY Solo Practitioners and Small Generalist Firms"
      strengths: ["Local presence", "Lower cost perception", "Informal referral networks"]
      weaknesses:
        - "No team depth for complex matters"
        - "No content marketing — invisible outside of referral network"
        - "No defined niche or avatar — 'we do all family law'"
        - "Slower response times; no visible intake process"
      positioning_gap: "Melissa already has team depth and specialization — most solo competitors can't compete on complexity or capacity"

    - name: "Online Divorce Platforms (LegalZoom, HelloDivorce, DivorceWriter)"
      strengths: ["Low cost", "Self-serve appeal for uncontested cases", "Strong digital marketing"]
      weaknesses:
        - "No legal judgment — template-only, not representation"
        - "Zero support when complexity arises (children, assets, conflict)"
        - "No local relationship or accountability"
        - "Clients who start here often need an attorney later at higher cost"
      positioning_gap: "Melissa can intercept the 'online divorce' consideration with educational content that shows the risks of going unrepresented"

  market_positioning_gap: >
    No family law practice in the Florence/NKY market has positioned specifically on
    collaborative approach + women-focused service + local authority. This is Melissa's
    market to claim — if she claims it deliberately and consistently.

  authority_gaps:
    - "No NKY family law attorney has a consistent content presence on collaborative divorce"
    - "Nobody is using email nurture for the long divorce consideration phase (average 6-18 months from decision to hiring)"
    - "Local SEO for specific terms ('collaborative divorce Florence KY', 'women's divorce attorney Northern Kentucky') is essentially uncontested"
    - "No NKY family law firm has a visible professional referral program with therapists and counselors"

  differentiators:
    - "11-year track record in Northern Kentucky — genuine community credibility"
    - "Team depth (3 attorneys + support) — handles complexity without solo bottleneck"
    - "Collaborative-first approach — defined philosophy, not just a tagline"
    - "Women-centered focus — messaging, intake, and service delivery aligned to primary avatar"
    - "Growing firm — signals stability and market confidence"

# ─────────────────────────────────────────
# FAST CASH SPRINT™ PRIORITIES
# ─────────────────────────────────────────
fast_cash_priorities:
  - rank: 1
    strategy_name: "Past Client Reactivation — Modification & Referral Sequence"
    strategy_reference: "Strategy 1 + 12 (Wake Past Clients + Bring Back Sooner)"
    rationale: >
      Eleven years of closed cases represents 300–400 past clients who already trust Melissa.
      Many have unaddressed modification needs (custody schedule changes, child support adjustments,
      enforcement issues) triggered by life changes in the years since their case closed.
      A 3-touch reactivation sequence — empathetic, informative, not salesy — should generate
      5–10 new matters within 30–45 days from a list she already owns.
    estimated_revenue_impact: "$27k–$55k (5–10 matters at avg $5,500)"
    implementation_timeline: "Days 1–30"
    required_assets:
      - "Past client contact list (email + mailing address)"
      - "Email platform access (or willingness to set one up)"
      - "Melissa approval of sequence copy before send"

  - rank: 2
    strategy_name: "Professional Referral Network Activation — Therapists & Counselors"
    strategy_reference: "Strategy 11 (Partner Marketing)"
    rationale: >
      Therapists, counselors, and social workers in Northern Kentucky are actively working
      with women navigating divorce. They refer to family law attorneys every week — but
      rarely have a go-to relationship. Melissa's collaborative, non-adversarial approach
      makes her the natural recommendation for a therapist who wants to protect a client's
      emotional wellbeing. A direct personal outreach to 25–40 NKY therapists/counselors
      with a clear referral protocol and a co-branded client resource could generate
      3–6 new referral relationships and 3–8 new cases within 60 days.
    estimated_revenue_impact: "$25k–$68k (3–8 new matters at avg $8,500)"
    implementation_timeline: "Days 8–60"
    required_assets:
      - "Target list of NKY therapists/counselors (Psychology Today, Google Search)"
      - "Simple one-page referral guide for therapists (ASG will produce)"
      - "Melissa's willingness to do 3–5 brief intro meetings or calls"

  - rank: 3
    strategy_name: "Legal Financing Implementation (LawPay / Affirm for Legal)"
    strategy_reference: "Strategy 10 (Financing)"
    rationale: >
      The #1 reason qualified prospects don't hire Melissa is the upfront retainer barrier.
      A woman navigating divorce who is already stressed about finances will hesitate at a
      $5k–$12k retainer even if she knows Melissa is the right attorney. Legal financing
      (LawPay's payment plans, Affirm for Legal, or similar) converts that hesitation into
      a yes. If Melissa closes 3–4 additional cases per month from prospects who previously
      said no due to cost, the annual revenue impact is substantial.
    estimated_revenue_impact: "$25k–$40k in recovered conversions in the first 90 days"
    implementation_timeline: "Days 1–14 (setup); ongoing thereafter"
    required_assets:
      - "Decision to implement (LawPay setup is same-week)"
      - "Intake script update to present financing as standard option"
      - "Website language update (1 paragraph)"

