# ─────────────────────────────────────────
# SEASONAL PATTERNS
# ─────────────────────────────────────────
seasonal_patterns:
  peak_months: ["January", "February", "September", "October"]
  consideration_months: ["March", "April", "November"]
  slow_months: ["June", "July", "December"]

  trigger_events:
    - name: "New Year Goal-Setting Season"
      timing: "January–February"
      notes: "Highest inquiry volume for individual coaching. Executives set annual goals, receive year-end reviews, and reflect on the gap between where they are and where they want to be. Content on clarity, direction, and career growth performs well."

    - name: "Mid-Year Review Season"
      timing: "June–July"
      notes: "Mid-year performance reviews trigger leadership coaching inquiries — especially for leaders who received critical feedback. Content on feedback integration and leadership adjustment."

    - name: "Budget and Planning Season"
      timing: "September–October"
      notes: "HR and L&D leaders plan next-year programs in Q3-Q4. Best window for organizational coaching and team development pitches. Content on leadership development ROI and culture investment."

    - name: "Q4 Organizational Decisions"
      timing: "October–November"
      notes: "Organizations making 2026 investment decisions. Team development and executive coaching program proposals should be in front of CHROs and L&D leaders by October."

# ─────────────────────────────────────────
# TRADEOFF MODEL (for Identity Self-Selection Sequence)
# ─────────────────────────────────────────
tradeoff_model:
  description: "The Certainty-Growth Tradeoff: leaders who optimize for comfort and certainty plateau faster than those who invest in deliberate self-development — even when they're more talented"
  application: "Avatar A (Growth-Oriented Leader) treats discomfort and challenge as investment signals. Avatar B (Comfort-Seeking Performer) mistakes current success for future readiness."

# ─────────────────────────────────────────
# COMPLIANCE FLAGS
# ─────────────────────────────────────────
compliance_flags:
  - "Cannot guarantee outcomes — coaching results vary based on client engagement, circumstance, and commitment. Use 'many clients report', 'clients often find', 'in our work together' framing."
  - "Testimonials and case studies require client consent. Anonymized case examples do not require consent but should not be identifiable."
  - "ICF ethical guidelines prohibit coaches from misrepresenting credentials or certifications. Any credential claims must be accurate."
  - "No mental health or therapy claims — coaching is distinct from licensed therapy. If a client presents clinical mental health needs, coaches are ethically required to refer to appropriate licensed professionals."
  - "Email marketing must include opt-out mechanism and accurate sender identification."
  - "ROI claims must be qualified: 'results vary based on client engagement and context' — never guaranteed outcomes."
  - "Content marketing disclaimer: 'The information shared is for educational purposes and represents general principles, not individualized advice.'"
