      - "Email nurture: 6-touch sequence for implant-curious prospects who haven't booked yet"
      - "Website: Dedicated implant page written to convert a research-stage patient, not just describe a service"

# ─────────────────────────────────────────
# SEASONAL PATTERNS
# ─────────────────────────────────────────
seasonal_patterns:
  peak_months: ["January", "February", "March", "September", "October"]
  slow_months: ["June", "July", "August", "November", "December"]

  trigger_events:
    - name: "New Year, New Smile"
      timing: "January 1 – March 15"
      notes: >
        Patients who have been considering implants for months make the decision in January.
        'New year, new start' framing works particularly well. Pre-load content in December.
        This is the highest-converting window of the year for implant case starts.

    - name: "Insurance Reset"
      timing: "January 1 – March 31"
      notes: >
        Patients with dental benefits renew in January. Even though implants are often
        partially covered, patients are motivated to use benefits before they expire.
        Content addressing "how much does insurance cover for implants?" performs
        extremely well during this window.

    - name: "Summer Slowdown Response"
      timing: "May – June (pre-summer prep)"
      notes: >
        Implant cases have long treatment timelines (3–9 months). Patients who start
        in May complete by fall/winter. Content in April–May that frames implant timing
        ("Start now, finish by the holidays") drives cases into the slower summer months.

    - name: "Back-to-Fall Reset"
      timing: "September – October"
      notes: >
        Second-highest conversion window. Patients are back in routine after summer,
        kids are back in school, and they're thinking about healthcare decisions
        they've been deferring. Implant consultations spike in this window.

    - name: "Year-End Benefits Use"
      timing: "October – November"
      notes: >
        "Use it or lose it" dental benefit urgency content performs well.
        Even for patients whose insurance doesn't fully cover implants,
        the urgency framing of year-end benefits accelerates decisions.

# ─────────────────────────────────────────
# COMPLIANCE FLAGS
# ─────────────────────────────────────────
compliance_flags:
  - "Cannot guarantee treatment outcomes. All content must use 'typically,' 'in most cases,' 'results vary' framing."
  - "Before/after photos require written HIPAA-compliant patient consent."
  - "Testimonials must be real patients who have provided written consent. No fabricated case stories."
  - "Success rate claims must cite actual data or be framed as clinical estimates with appropriate qualification."
  - "Financing content must accurately represent APR, terms, and third-party provider where applicable."
  - "State dental board advertising rules apply. Review 'specialist' claims — 'implant specialist' has specific regulatory meaning in some states."
  - "Patient photos, including smile transformations, require signed release forms."
  - "Email marketing must include opt-out mechanism and practice identification."
  - "Content comparing the dentist favorably to oral surgeons or periodontists must be factual and not disparaging."
