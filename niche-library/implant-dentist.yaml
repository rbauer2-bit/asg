# implant-dentist.yaml
# Authority Systems Group™ — Niche Intelligence Library
# Niche: Implant Dentist (General Dentist Transitioning to Implant-Focused Practice)
# Prepared by: Vivienne Carr, CMO + Daniel Frost, CSO
# Reviewed by: Roger Bauer, Director

niche_id: "implant-dentist"
niche_name: "Implant Dentist"
niche_subtype: "General dentist with implant training seeking case-mix shift to high-ticket implant work"
vertical_category: "dental / healthcare"
last_updated: "2026-03"

# ─────────────────────────────────────────
# NICHE CONTEXT — VIVIENNE CARR, CMO
# ─────────────────────────────────────────
# This niche requires a positioning shift, not a marketing budget increase.
# The dentist is NOT unknown — he is miscategorized.
# The market does not see him as an implant specialist. It sees him as a general dentist.
# Every content, copy, and campaign decision must be engineered to collapse that gap.
# The goal is to become the recognized implant authority in his market
# so that implant-ready patients seek him out pre-sold.

# ─────────────────────────────────────────
# TYPICAL BUSINESS PROFILE
# ─────────────────────────────────────────
typical_business_profile:
  practice_type: "solo or 2-associate general dentistry practice with implant capability"
  practice_size: "1–3 dentists, 4–8 staff"
  avg_single_implant_case_value: "$3,500–$6,500"
  avg_full_arch_case_value: "$25,000–$85,000"
  avg_general_dentistry_production_per_day: "$1,200–$2,800"
  avg_overhead_percent: "62–72%"
  current_implant_revenue_share: "10–20%"
  target_implant_revenue_share: "50–70%"
  typical_crm_and_software: "Dentrix | Eaglesoft | Open Dental | No formal CRM"
  patient_volume_per_day: "15–25 patients"
  insurance_status: "Typically in-network with 3–8 plans (the cage)"
  target_insurance_status: "Fee-for-service or limited in-network (the goal)"

  revenue_mix_current:
    - service: "Preventive / hygiene (exams, cleanings, X-rays)"
      revenue_share: "25–35%"
      avg_value: "$150–$350 per visit"
      notes: "Insurance-driven, high volume, low margin, not differentiating"
    - service: "Restorative (fillings, crowns, bridges)"
      revenue_share: "30–40%"
      avg_value: "$200–$1,800 per procedure"
      notes: "Core production — steady but capped by chair time"
    - service: "Single-tooth implants"
      revenue_share: "10–15%"
      avg_value: "$3,500–$6,500 per case"
      notes: "High margin but underpromoted — patients referred out or not offered"
    - service: "Full-arch implants (All-on-4, All-on-X, implant-supported dentures)"
      revenue_share: "2–8%"
      avg_value: "$25,000–$85,000 per case"
      notes: "The prize — highest value, highest margin, most transformative"
    - service: "Other (endo, ortho, oral surgery, whitening)"
      revenue_share: "10–20%"
      avg_value: "varies"
      notes: "Filler work — often retained out of obligation, not strategy"

  revenue_mix_target:
    - service: "Full-arch implant cases"
      revenue_share: "35–50%"
    - service: "Single-tooth implants + bone grafting + related surgical"
      revenue_share: "20–30%"
    - service: "Crown & bridge (implant-supported, complex restorative)"
      revenue_share: "10–15%"
    - service: "Preventive / general (retained selectively, existing patients only)"
      revenue_share: "10–15%"

# ─────────────────────────────────────────
# PRIMARY AVATAR — "FULL-ARCH FRANK"
# Prepared by: Vivienne Carr, CMO
# ─────────────────────────────────────────
avatar_archetypes:

  - avatar_id: "full-arch-frank"
    avatar_name: "Full-Arch Frank"
    tagline: "He has the skills. He doesn't have the cases."
    primary_service: "Full-arch and single-tooth implant case growth"
    age_range: "38–54"
    gender_skew: "60% male, 40% female — use gender-neutral language in all client-facing output"
    income_gross_collections: "$600,000–$1,500,000"
    income_net_take_home: "$180,000–$380,000"
    income_gap_note: >
      High overhead (staff, equipment, supplies, lab, rent) eats 62–72 cents of every dollar.
      Frank makes good money on paper. He makes frustrating money in reality.
      This gap is the central financial tension that drives his motivation.
    years_in_practice: "8–22 years"
    implant_training: >
      Completed implant training — likely at Misch Institute, AAID, Implant Seminars, or a weekend
      CE course. May have done hands-on mentorship. Has placed implants. Not a beginner —
      but not high-volume either. Places 2–6 implants per month, wants 15–25+.
    geography: "Suburban or mid-sized city markets — enough population density, not yet saturated by specialists"

    # ─────────────────────────────────────
    # CURRENT SITUATION
    # ─────────────────────────────────────
    current_situation:
      daily_reality: >
        Frank walks out of a 9-hour clinical day having seen 20 patients — exams, fillings, hygiene
        checks, an emergency crown, a denture adjustment. He grossed about $4,200 today.
        He knows a periodontist two miles away just collected $42,000 for an All-on-4 case
        that took two days of work. That math doesn't leave him alone.

      the_core_tension: >
        He has the clinical training to do high-value implant cases. He is NOT doing them at
        volume because the market doesn't see him that way. His patients see him as their
        family dentist. When they need implants, they think "specialist." They don't think Frank.
        Frank gets the crown. The oral surgeon or the implant-focused practice gets the case.

      what_keeps_him_stuck:
        - "Insurance contracts lock him into a volume game — he can't easily drop patients without replacing revenue"
        - "His schedule is full of low-ticket work, leaving no mental bandwidth for marketing or positioning"
        - "He tried 'dental marketing' and got more cleaning patients — the exact opposite of what he needs"
        - "He doesn't know how to position himself as an implant specialist without feeling like he's overstating credentials"
        - "His website says 'full-service family dentistry' — which tells implant patients to go elsewhere"
        - "He waits for word-of-mouth referrals on implants rather than engineering them"

    # ─────────────────────────────────────
    # GOALS AND DESIRES
    # ─────────────────────────────────────
    primary_goals:
      - "Do 6–10 implant cases per month instead of 2–4"
      - "Replace 3 days of general dentistry production with 1 day of implant production"
      - "Go fee-for-service or significantly reduce insurance dependency"
      - "Be known as THE implant dentist in his market — not a general dentist who does implants on the side"
      - "Reduce patient load from 18–22/day to 10–14/day while maintaining or growing net income"
      - "Attract patients who have already decided they want implants and are looking for who to trust"

    secondary_goals:
      - "Build a practice that he could sell at a premium (implant-heavy practices command higher multiples)"
      - "Stop being dependent on insurance reimbursement schedules for his income"
      - "Have a team that runs the front end of the practice so he can focus on clinical work"
      - "Be able to decline the cases he doesn't want without financial anxiety"

    financial_target:
      ideal_weekly_production: "$35,000–$60,000 gross"
      ideal_days_worked_per_week: "3.5–4 days"
      ideal_net_income: "$400,000–$600,000"
      path_to_target: >
        5 full-arch cases/month ($175k–$250k) + 15 single implants ($52k–$97k)
        = $227k–$347k implant production/month at full capacity.
        At 38% net margin, that's $86k–$132k net/month. The math works.
        Frank's problem is not math. It's positioning and pipeline.

    # ─────────────────────────────────────
    # BELIEF-TO-BUY FRAMEWORK™ MAPPING
    # Prepared by: Vivienne Carr, CMO + Dr. Raymond Cross, Board
    # ─────────────────────────────────────
    belief_to_buy_framework:

      # BELIEF TRACK — What Frank thinks is true (and must shift)
      belief_track:

        enemy_belief_1:
          stage: "Enemy Belief"
          belief: "I need to stay in-network with insurance to keep the lights on."
          why_it_stalls: >
            This is the primary cage. As long as Frank believes insurance volume is his
            financial floor, he will never make room for the higher-ticket work that
            requires different marketing, different positioning, and different patient types.
          pre_frame_needed: >
            Show him the math of what one full-arch case replaces in insurance-volume production.
            One $45,000 case = 37 hygiene appointments at $1,200/day. He doesn't need volume.
            He needs a different kind of case.

        enemy_belief_2:
          stage: "Enemy Belief"
          belief: "Implant patients go to specialists — oral surgeons and periodontists. That's just how it works."
          why_it_stalls: >
            Frank has accepted a market reality that is, in most suburban markets, a positioning
            myth — not an immutable fact. Implant patients go to whoever is positioned as the
            trusted authority in their market. That can be a general dentist with strong positioning.
            The belief protects him from having to compete. It also keeps him out of the game.
          pre_frame_needed: >
            Show him markets where general dentists with intentional authority positioning
            dominate implant case flow over established specialists. The differentiator is
            trust-before-visit, not credentials.

        enemy_belief_3:
          stage: "Enemy Belief"
          belief: "I'm not ready to position myself as an implant specialist — I need to do more cases first."
          why_it_stalls: >
            Classic chicken-and-egg paralysis. He won't market himself as the implant authority
            until he has more cases. He won't get more cases until he's the implant authority.
            This belief keeps him perpetually stuck at 2–4 implants per month.
          pre_frame_needed: >
            Authority is not about case count. It's about who shows up consistently, educates
            the market, and earns trust before the patient ever calls. Frank is waiting for
            permission that the market will never give him unprompted.

        enemy_belief_4:
          stage: "Enemy Belief"
          belief: "Marketing doesn't really work for dental — especially for something like implants."
          why_it_stalls: >
            A prior bad experience with a generic dental marketing agency (who delivered cleaning
            patients instead of implant patients) has poisoned the well. He conflates bad-fit
            marketing with all marketing.
          pre_frame_needed: >
            The agency ran volume-based lead generation. That is not authority marketing.
            Authority marketing pre-qualifies patients through education and social proof
            before they call. The result is fewer calls, higher close rate, and bigger cases.

        new_worldview_target: >
          "I don't need more patients — I need to own a specific space in my market's mind.
          When anyone in [his city] thinks 'dental implants,' I need to be the name that comes up.
          That is a positioning problem. And positioning is solvable."

        internal_alignment_signal: >
          Frank starts doing the math himself. Unprompted, he says something like:
          "If I replaced even 4 of my 9 insurance-heavy days per month with 1 implant case each,
          I'd make more and work less." He's doing our math. He's in alignment.

        certainty_triggers:
          - "Seeing a case study of a dentist in a comparable market who made the shift"
          - "Seeing specific examples of authority content that pre-sold implant patients"
          - "Hearing that the ASG system is implant-niche-specific — not a generic dental play"
          - "Understanding that the positioning shift does NOT require dropping insurance cold turkey"

      # EMOTION TRACK — What Frank feels is true (and must shift)
      emotion_track:

        dissatisfaction:
          current_pain: >
            Frank's version of Friday is not a victory lap. It's exhaustion math.
            He saw 22 patients. He stayed an hour late. His hygienist called in sick.
            He netted about $2,100 after overhead. His body hurts.
            He knows that's less than what one implant crown and abutment would have paid.
          emotional_state: "Frustrated, physically worn down, quietly resentful of the treadmill he's on"

        contrast:
          the_pivot_moment: >
            One quarter, Frank does an All-on-4 case — a patient who came in from a Facebook post
            his office manager put up. $38,000 case. Two appointments. He walks out thinking:
            "That was different. That felt like what I trained for."
            He sees what's possible. The contrast is visceral. He doesn't forget it.

        desire:
          what_he_wants_to_feel: >
            A schedule with 3 high-value appointments where his skills are fully deployed.
            Walking out by 4pm having produced $8,000–$12,000.
            Being introduced at a CE course as "the implant guy in [his city]."
            Having patients come in already saying "I want implants — I looked you up and I want you."

        urgency:
          what_accelerates_the_decision: >
            A corporate dental group just opened a third location in his area.
            They're advertising heavily. His new-patient calls are down 18% year-over-year.
            His associate just left to open his own practice. His lab costs went up 12%.
            He realizes that doing nothing is not a neutral choice — it's a slow decay.

        relief:
          what_the_right_solution_feels_like: >
            The version of Frank who runs an implant-authority practice doesn't stress about
            insurance fee schedules. His patients are pre-qualified. His schedule is intentional.
            He's known. The work is satisfying. He's not on the treadmill anymore.
            That version of the practice is not fantasy — it's a positioning problem with a solution.

    # ─────────────────────────────────────
    # WHAT FRANK HAS ALREADY TRIED
    # ─────────────────────────────────────
    prior_solutions_tried:
      - solution: "Hired a dental marketing agency"
        result: "Got more cleaning patients. Agency optimized for 'new patient volume,' not case type."
        residual_belief: "Marketing for implants doesn't work / agencies don't understand dental"

      - solution: "Facebook and Instagram ads"
        result: "Got engagement, a few calls, no cases. Spent $800–$2,000/month with nothing to show."
        residual_belief: "Social media is a waste for implants — implant patients don't come from Facebook"

      - solution: "Google ads (Pay-per-click)"
        result: "Ran $600–$1,200/month. Got calls from unqualified patients asking about price."
        residual_belief: "Google just brings in price shoppers — not the patients I want"

      - solution: "Postcards / direct mail"
        result: "Low response rate. Attracted coupon-mentality new patients."
        residual_belief: "Traditional advertising is outdated"

      - solution: "Word of mouth / asking patients to refer"
        result: "Gets some referrals but not implant-specific. Inconsistent."
        residual_belief: "Referrals are the best source but you can't control them"

      - solution: "Website redesign"
        result: "Nice-looking site. Still says 'family dentistry.' Not converting implant cases."
        residual_belief: "The website looks good — it's probably not the problem"
        note: "The website IS the problem — it doesn't position him as the implant authority"

      - solution: "Study clubs and CE courses (peer learning)"
        result: "Improved clinical skills. No business or marketing outcome."
        residual_belief: "The clinical side is fine — I just need the right patients to find me"

    # ─────────────────────────────────────
    # OBJECTIONS TO ADDRESS
    # ─────────────────────────────────────
    objections:

      - objection: "I've already spent money on marketing and it didn't work."
        underlying_fear: "I don't want to waste another $20,000 on something that won't move the needle."
        reframe: >
          What didn't work was volume marketing — the kind designed to fill chairs with any patient.
          Authority positioning is engineered for one outcome: to make implant patients choose you
          before they call anyone else. It's a different system targeting a different patient at a
          different stage of the buying journey. The comparison isn't valid.

      - objection: "I can't afford to reduce general dentistry volume while I'm building implant cases."
        underlying_fear: "The transition will hurt cash flow and I'll lose staff or fall behind on overhead."
        reframe: >
          The shift is gradual. You're not flipping a switch — you're engineering a pull toward
          implant cases while your general production remains your floor. As implant cases grow,
          you make strategic reductions. One $45,000 case replaces three weeks of general production.
          You don't need 20 implant cases to make the math work. You need 3–4 more per month.

      - objection: "My patients trust me as their family dentist — I don't want to seem like I'm abandoning them."
        underlying_fear: "Repositioning will feel like I'm pulling away from the patients who built my practice."
        reframe: >
          You're not changing who you are. You're clarifying what you're known for.
          Your existing patients stay. They tell people about you differently.
          Instead of 'my dentist,' they say 'my dentist — he does implants, he's excellent.'
          That's the referral you've been waiting for. Positioning amplifies trust. It doesn't erase it.

      - objection: "The big implant cases in my market all go to the oral surgeon or the specialty group."
        underlying_fear: "The specialists have too much of a head start — I can't compete."
        reframe: >
          In most markets, 'the specialist' wins because of default routing — not because they
          outmarket anyone. Patients are referred there before they ever search. Authority marketing
          intercepts patients in the research phase — before the referral happens. If you own that
          online moment, the case comes to you first.

      - objection: "What makes you different from the other dental marketing companies I've worked with?"
        underlying_fear: "Another agency making promises they won't keep."
        reframe: >
          We don't run dental marketing campaigns. We build authority systems.
          The difference is that our work changes how the market perceives you — not just
          how many people see your ads. When your positioning is right, patients arrive
          pre-sold, pre-qualified, and already trusting you. That is a structural change,
          not a campaign.

    # ─────────────────────────────────────
    # TRUSTED CONTENT CHANNELS
    # ─────────────────────────────────────
    trusted_content_channels:
      primary:
        - "Google Search (high-intent research for implant-specific content)"
        - "YouTube (clinical and business content for dentists)"
        - "Dental podcasts — The Dental Marketer, Dental MBA, Shared Practices, The Dentalpreneur"
        - "Dental study clubs (peer accountability and clinical education)"
        - "CE courses — AAID, Misch Institute, Kois Center, Spear Education"

      secondary:
        - "Facebook Groups (Dental Implant Study Club, Dentists Who Invest, Implant Dentistry forums)"
        - "Instagram (follows high-producing dentists for FOMO and aspiration content)"
        - "Dental trade publications (Dental Economics, Dentistry Today, Inside Dentistry)"
        - "Email newsletters from ADA, AGD, implant manufacturers (Straumann, Nobel Biocare, BioHorizons)"
        - "Peer referrals from other dentists who've made the implant transition"

      influencers_and_trust_sources:
        - "Dentists who made the transition and speak publicly about it (case study peer)"
        - "AAID and Misch Institute instructors (clinical credibility)"
        - "Dental practice consultants who specialize in implant case acceptance"
        - "Implant manufacturer reps (often the first business conversation Frank has about growth)"

    # ─────────────────────────────────────
    # LANGUAGE FRANK USES
    # ─────────────────────────────────────
    voice_and_language:
      industry_terms_he_uses:
        - "Full-arch cases" / "All-on-4" / "All-on-X" / "implant-supported overdentures"
        - "Production" (not revenue — dentists say production)
        - "Per-hour production" or "per-diem production"
        - "Case acceptance" (conversion rate in dental language)
        - "Fee-for-service" (the dream — no insurance)
        - "Drop insurance" / "go out of network"
        - "Big cases" / "high-value cases"
        - "New patient calls" (top of funnel)
        - "Treatment coordinator" (the person who closes the case)
        - "Implant consult" (the meeting where Frank presents treatment and Frank loses cases)
        - "Bone graft" / "sinus lift" / "immediate load" (clinical vocabulary that signals expertise)
        - "Full-mouth reconstruction"

      how_he_talks_about_the_problem:
        - "I want to do more big cases"
        - "I'm tired of seeing 20 patients a day"
        - "I've done the training — I just can't find the cases"
        - "I know implants are where the money is, I just can't seem to attract those patients"
        - "My marketing isn't generating the right type of patient"
        - "I want to work less and make the same money"
        - "I want to be known as the implant guy in [city]"

      how_NOT_to_talk_to_him:
        - Do not call it "dental marketing" — he has bad associations with that term
        - Do not lead with social media follower counts or impressions — he wants cases, not likes
        - Do not use generic growth language — he has heard it from every agency
        - Do not start with price — start with case outcomes and proof
        - Do not talk about "new patients" generically — talk about implant patients specifically

    # ─────────────────────────────────────
    # WHAT A WIN LOOKS LIKE
    # ─────────────────────────────────────
    definition_of_a_win:
      three_month_win: "2–3 additional implant cases per month, at least one full-arch consult booked"
      six_month_win: "5–7 implant cases/month, first full-arch case closed, implant revenue up 40%+"
      twelve_month_win: >
        Implants represent 40%+ of production. Frank is working 4 days/week.
        He declined 3 insurance contracts he no longer needs.
        He has a waitlist for implant consults. His treatment coordinator closes at 65%+.
        His market knows his name for implants — not for cleanings.

      the_moment_he_knew_it_worked: >
        A new patient calls and says: "I've been researching implants for three months.
        I watched your videos, I read your patient stories, and I just want to go with you.
        I don't need to see anyone else." That call is the system working.

  # ─────────────────────────────────────────
  # SECONDARY AVATAR — "EXIT-PLANNING ELLEN"
  # ─────────────────────────────────────────
  - avatar_id: "exit-planning-ellen"
    avatar_name: "Exit-Planning Ellen"
    tagline: "She wants to maximize practice value before she sells — and implants are the fastest path."
    primary_service: "Implant case growth + practice valuation positioning"
    age_range: "52–63"
    gender_skew: "gender-neutral — applies equally to male and female dentists approaching exit"
    years_in_practice: "20–35 years"

    current_situation: >
      Ellen is 5–10 years from selling or transitioning her practice. She knows that implant-heavy
      practices sell at 80–100% of annual collections vs. 65–75% for general practices.
      She wants to shift the revenue mix toward implants in the final years to increase the
      practice multiple. She also wants to reduce the physical grind of high-volume general
      dentistry while keeping income strong through the transition years.

    primary_motivations:
      - "Maximize exit valuation — implant practices command premium multiples"
      - "Reduce clinical days and patient volume without income sacrifice"
      - "Build a practice that operates without her being in every chair — systems over heroics"
      - "Leave a legacy practice, not a commodity dental office"

    key_differences_from_full_arch_frank:
      - "Less price-sensitive — understands investment in practice development"
      - "More focused on team and systems than on personal clinical volume"
      - "Thinks in terms of practice equity, not just monthly production"
      - "More likely to bring in an associate or partner as part of the transition"
      - "Actively researching DSO acquisition dynamics and what buyers look for"

    belief_barriers:
      enemy_belief_primary: >
        "It's too late to reposition at this stage of my career — buyers want an established brand,
        not something I built in the last 5 years."
      reframe: >
        Practice buyers and DSOs pay for CURRENT revenue mix and trajectory — not history.
        A practice that shows 3 years of implant growth trending upward is more valuable than
        a 30-year general practice with flat collections. The shift is exactly what adds value.
      enemy_belief_secondary: >
        "I just need to hold on for a few more years — the practice will sell for what it sells for."
      reframe: >
        Every year of general-heavy production is a year of equity left on the table.
        The delta between a general practice multiple and an implant practice multiple,
        at $1M in annual collections, is $150,000–$300,000 in exit value. That is addressable.

# ─────────────────────────────────────────
# COMPETITIVE LANDSCAPE — DANIEL FROST, CSO
# ─────────────────────────────────────────
competitive_landscape_patterns:
  common_competitor_weaknesses:
    - "Oral surgeons and periodontists dominate by referral routing, not authority marketing — they have NO direct-to-patient content presence"
    - "Corporate dental groups market on price and convenience — not expertise. Premium implant patients actively distrust this."
    - "Most implant-capable general dentists have websites that say 'we offer implants' with zero educational content or proof"
    - "Competitors rely on dentist-to-dentist referrals — a closed loop Frank can break by owning the consumer search moment"
    - "Almost no implant dentist in most suburban markets has a YouTube channel, a review strategy, or a content engine of any kind"
    - "Case presentation skills are universally weak — most dentists rely on price sheets, not belief-shifting consultations"

  typical_positioning_gaps:
    - "No dentist in most markets owns 'dental implants [city]' in the consumer's mind — it's available"
    - "The 'trust before visit' moment — patients research for 3–12 months before calling. Nobody is in that research phase with them."
    - "No competitor is consistently publishing patient transformation content that makes implants feel achievable vs. intimidating"
    - "Nobody is addressing the fear of cost, fear of surgery, or fear of failure in their content — these are the three conversion blockers"
    - "Implant manufacturers market product to dentists — nobody is marketing authority positioning to the patient on the dentist's behalf"

  authority_gaps:
    - "YouTube presence for implant education — almost always completely vacant in suburban markets"
    - "Google review volume for 'implants' specifically — most dentists have general reviews, not procedure-specific proof"
    - "Email nurture for implant-curious patients — nobody is running a 6-month educational sequence for patients considering implants"
    - "Before/after case galleries with real patient stories — clinical photos exist; compelling narratives do not"
    - "A clear answer to 'Why you over the oral surgeon?' — most dentists cannot articulate this with conviction"

# ─────────────────────────────────────────
# FAST CASH STRATEGY FIT RATINGS
# Prepared by: Tanya Blackwood, CRO
# ─────────────────────────────────────────
fast_cash_strategy_fit:

  strategy_1_wake_past_clients:
    fit: "high"
    notes: >
      Every dentist has patients who were diagnosed with implant need and never moved forward.
      A reactivation sequence targeting "implant-diagnosed, not-yet-treated" patients
      is the single fastest cash opportunity in this niche. Most practices have 30–80 of these.

  strategy_2_raise_prices:
    fit: "high"
    notes: >
      Most implant dentists are significantly underpricing. A 10–20% fee increase with
      repositioned authority framing is immediately executable. Implant patients are
      not shopping on price — they are shopping on trust. Higher fees signal higher trust.

  strategy_3_upsell_existing:
    fit: "high"
    notes: >
      Every full-arch patient has referred someone who is "missing teeth and thinking about it."
      A structured patient activation sequence asking satisfied implant patients to share
      their story is the highest-ROI referral strategy in dental.

  strategy_4_gift_cards:
    fit: "not-applicable"
    notes: "Not appropriate for dental procedures."

  strategy_5_referrals:
    fit: "high"
    notes: >
      Three referral channels: (1) patient-to-patient — existing implant patients referring.
      (2) GP-to-specialist loop — other general dentists referring surgical cases.
      (3) Physician loop — ENTs, sleep medicine, oncologists referring edentulous patients.
      Almost no implant dentist has a formal referral program. This is uncontested territory.

  strategy_6_flash_sales:
    fit: "low"
    notes: >
      Discounting implants attracts the wrong patient and destroys premium positioning.
      A 'free consultation' or 'complimentary implant planning session' is acceptable
      as a conversion tool but must not be framed as a discount.

  strategy_7_hidden_money:
    fit: "high"
    notes: >
      Most dental practices have unbilled treatment plans, lapsed treatment, and
      insurance reimbursements they're leaving uncollected. An accounts receivable
      and outstanding treatment plan audit typically surfaces $15,000–$50,000.

  strategy_8_subscriptions:
    fit: "medium"
    notes: >
      An in-house dental membership plan (for uninsured/underinsured patients)
      creates predictable monthly revenue and keeps implant patients in the ecosystem.
      Highly applicable for fee-for-service transition strategy.

  strategy_9_prepaid_packages:
    fit: "high"
    notes: >
      Full-arch treatment coordination packages with staged payment plans
      significantly increase case acceptance. A 'same-day smile planning' bundle
      with a clear deliverable at the consultation improves close rate dramatically.

  strategy_10_financing:
    fit: "critical — highest priority"
    notes: >
      The #1 barrier to implant case acceptance is perceived cost — not actual cost.
      Offering in-house payment plans and third-party financing (CareCredit, Sunbit, LendingClub)
      removes the barrier entirely. A $45,000 case at $850/month becomes a different conversation.
      Most dentists mention financing once. Frank should lead with it.

  strategy_11_partner_marketing:
    fit: "high"
    notes: >
      Strategic referral partnerships with: physicians (oncologists, ENTs, sleep specialists),
      prosthodontists (surgical referral loop), primary care providers treating edentulous patients,
      and senior living facilities. All largely untapped.

  strategy_12_bring_back_sooner:
    fit: "high"
    notes: >
      Implant patients have ongoing maintenance needs (annual implant checks, prosthetic adjustments).
      A structured recall system for implant maintenance creates recurring revenue and
      generates ongoing referral opportunities from satisfied patients.

  strategy_13_one_time_offer:
    fit: "low"
    notes: "FOMO urgency tactics are inappropriate for surgical procedures and destroy trust."

  strategy_14_sell_what_pays:
    fit: "critical — core strategy"
    notes: >
      The entire ASG engagement is built on this principle for this niche.
      Frank should quantify his per-hour production for implant work vs. general work.
      The Pareto analysis almost always shows that 20% of his cases generate 60–70% of margin.
      That 20% should define his new practice model, not be squeezed in around everything else.

  strategy_15_teach_what_you_know:
    fit: "high"
    notes: >
      Educational workshops — "Are Dental Implants Right for You?" evenings for patients
      considering implants — consistently convert at 40–60% into consultation bookings.
      CE content for other general dentists positions Frank as the implant referral destination.

  strategy_16_keep_more_earn:
    fit: "medium"
    notes: >
      Lab cost reduction (in-house milling for some restorations, lab renegotiation),
      supply management, and overhead audit. Not the primary lever but relevant.

  strategy_17_marketing_calendar:
    fit: "high"
    notes: >
      Implant case decisions are seasonal. Spring and fall show peak patient research behavior.
      January (new year, new smile decisions) and September (back to routine after summer)
      are peak conversion windows. A planned content calendar targeting these windows
      is substantially more effective than year-round even distribution.

  strategy_18_loyalty_program:
    fit: "low"
    notes: "Not appropriate for surgical procedures. Relationship maintenance via personal outreach is more appropriate."

  strategy_19_local_seo:
    fit: "critical — highest priority"
    notes: >
      "Dental implants [city]" and related terms are high-intent search terms with significant
      monthly volume in most markets. Google Business Profile optimization for implant-specific
      reviews and content is almost always uncontested. This is the fastest organic lead channel.

  strategy_20_bundling:
    fit: "high"
    notes: >
      Full-arch treatment bundles (implants + extractions + bone grafting + final restoration)
      presented as a complete solution — not line-itemed procedures — improve case acceptance
      by removing price-comparison behavior. Bundle the outcome, not the components.

  strategy_21_events:
    fit: "high"
    notes: >
      Patient education events ("Reclaim Your Smile — Free Implant Information Evening")
      convert at very high rates. Attendees are self-selecting as implant-serious.
      One event per quarter with 15–20 attendees typically produces 4–8 consults.

  strategy_22_clear_inventory:
    fit: "not-applicable"
    notes: "Service business. No inventory to clear."

  top_5_recommended:
    - strategy: 1
      name: "Wake Dormant Implant-Diagnosed Patients"
      priority: 1
      rationale: >
        Frank's practice almost certainly contains 30–80 patients who received an implant
        diagnosis and never scheduled. A 3-touch reactivation sequence to these patients
        is the fastest cash move available. Cost: near zero. Timeline: 2–3 weeks to first case.

    - strategy: 10
      name: "Lead With Financing at Every Implant Consultation"
      priority: 2
      rationale: >
        Case acceptance for implants lives or dies on how financing is presented.
        If Frank tables the investment before the patient has fully decided, he loses the case.
        Training his treatment coordinator to lead with the monthly payment — not the total fee —
        will increase his close rate by 20–35% with no additional marketing spend.

    - strategy: 14
      name: "Sell What Pays — Pareto the Practice"
      priority: 3
      rationale: >
        Frank needs to see his own numbers. Once he quantifies his per-hour production by
        procedure type, the decision to rebalance becomes obvious. This is the strategic
        foundation everything else is built on. Do this first.

    - strategy: 19
      name: "Local SEO — Own 'Dental Implants [City]'"
      priority: 4
      rationale: >
        High-intent searchers are looking for an implant dentist right now in Frank's market.
        Nobody is competing seriously for this position in most suburban markets.
        Google Business Profile optimization + review strategy for implant-specific keywords
        produces consistent inbound leads within 60–90 days.

    - strategy: 5
      name: "Activate Patient Referral Loop for Implant Cases"
      priority: 5
      rationale: >
        Every satisfied implant patient Frank has done is a referral engine.
        Most dentists never ask. A simple post-treatment referral sequence
        ("You just changed your life — if you know someone who's been putting this off, here's how to share Frank's number")
        activates this channel without additional ad spend.

