  common_competitor_weaknesses:
    - "Generic websites with stock photos — no real job photos, no crew, no face on the brand"
    - "No mention of ISA certification or what it means for the homeowner"
    - "No explanation of why their price is higher than the lowballer — they just say 'we're insured'"
    - "Reviews are sparse and never responded to"
    - "No educational content — nothing to differentiate them from any other company"
    - "No follow-up after an estimate that didn't close"
    - "No PHC service mentioned or positioned"
