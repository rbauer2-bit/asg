  typical_positioning_gaps:
    - "Nobody in most markets has a consistent 'arborist education' content presence"
    - "ISA credential is almost universally buried in fine print rather than led with"
    - "Very few position emergency work as a premium specialized service with defined pricing"
    - "Plant Health Care as a named recurring service is almost completely absent from small operator marketing"

  authority_gaps:
    - "Google Business Profile optimization is almost never done beyond basic setup"
    - "Video content showing actual work, crew expertise, and arborist knowledge is almost nonexistent"
    - "No competitor in most markets has a referral program with property managers, landscapers, or real estate agents"
