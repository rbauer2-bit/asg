    - "No competitor has a follow-up sequence for unconverted estimates"

# ─────────────────────────────────────────
# INSIDER INTELLIGENCE — AGENCY AUTHORITY BUILDERS
# ─────────────────────────────────────────
insider_intelligence:
  # These facts, when deployed in a prospect conversation, immediately
  # separate ASG from every generalist agency that has ever pitched Charlie.
  authority_facts:
    - topic: "PHC as recurring revenue"
      insight: "Plant Health Care (deep root fertilization, disease management, cable bracing, air spading) is the closest thing tree service has to an annuity. A property with 20 mature trees can generate $800–$2,000/year in treatments indefinitely. Most operators have never built it out or gave it away as a loss leader."

    - topic: "ISA Certified Arborist credential"
      insight: "ISA CA requires documented field experience, a proctored exam, and ongoing CEU requirements. ISA Board Certified Master Arborist is held by fewer than 400 people in the US. Almost no tree service operator leads with this in their marketing — it's always buried in fine print."

    - topic: "Storm response premium rates"
      insight: "Emergency storm work commands 1.5–2.5x standard rates. Most operators charge standard rates because they don't have a defined emergency rate structure and feel uncomfortable quoting higher. Defined emergency pricing with a simple rationale closes without resistance."

    - topic: "Neighbor notification liability gap"
      insight: "Before a major removal on a property line, smart operators notify adjacent neighbors in writing. Most don't. When something goes sideways and neighbor property is damaged, written notice is the difference between an insured claim and a lawsuit."

    - topic: "Crane vs. climb economics"
      insight: "A crane job that takes 3 hours often costs the same or less in total job time as a difficult climbing job that takes 8 hours with more risk. Crane rental ($800–$1,500/day) is often MORE profitable. Homeowners think crane = expensive. The operator who can flip that script closes more crane jobs."

    - topic: "Dormancy window pitch"
      insight: "Winter removal is often BETTER for remaining trees (lower disease transfer risk, visible structure, less site damage). Most operators don't make this argument and either discount to fill the winter calendar or simply go quiet. Content that educates homeowners on winter removal timing generates bookings at full rate."

    - topic: "Municipal / heritage tree ordinances"
      insight: "Many municipalities have heritage tree ordinances — remove a designated tree without a permit and the fine is $5,000–$50,000 with a replacement order. An arborist who educates clients on this during the estimate provides professional protection. Most operators never mention it."

    - topic: "Stump grinding as standalone profit center"
      insight: "Many operators include stump grinding as an add-on or give it away to close removals. Marketed as a standalone service targeting homeowners with existing stumps, it generates high-margin work from people who aren't in a removal cycle."

    - topic: "Estimate visit as sales visit"
      insight: "The estimate visit IS the sales opportunity. Most operators treat it as an obligation to quote. A structured walkthrough checklist that identifies every tree on the property — not just the one they called about — can increase average job ticket 30–50%."

    - topic: "Referral network economics"
      insight: "A single HOA property manager can control 200–400 properties. A single landscaper sees tree problems on every job. A real estate agent's buyers need pre-sale tree assessments. One formalized referral relationship with a property manager is worth $30,000–$80,000/year. Most tree operators have never sent a professional letter to one."

    - topic: "Firewood as secondary revenue"
      insight: "A tree service doing $800K/year in removals generates hundreds of cords of firewood annually. Most operators dispose of it or give away wood chips. Some have built $60,000–$150,000 secondary revenue streams selling seasoned firewood. Nobody in generalist marketing talks about the wood."

    - topic: "Bid bonds and commercial contracts"
      insight: "The tree service that can submit a bid bond and respond to commercial RFPs (municipalities, school districts, commercial property management) plays a completely different revenue game. Most small operators have never done it. The ones who learn the process can 10x contract value per job."

# ─────────────────────────────────────────
# FAST CASH STRATEGY FIT RATINGS
# ─────────────────────────────────────────
fast_cash_strategy_fit:
  # Rating: high | medium | low | not-applicable

  strategy_1_wake_past_clients:
    fit: "high"
    notes: "Past clients with mature trees are an ongoing revenue source — PHC programs, additional removals, annual trimming. A reactivation sequence targeting 'time for your annual tree check' is immediately executable with no new infrastructure."

  strategy_2_raise_prices:
    fit: "high"
    notes: "Most tree service operators are underpriced for their credential level and liability exposure. A 10–15% rate increase with clearer positioning around ISA certification and fully-insured crew is immediately executable for most clients."

  strategy_3_upsell_existing:
    fit: "high"
    notes: "Estimate visits are an ideal upsell moment — structured walkthrough of the full property increases average job ticket 30–50%. PHC program intro to every removal client. Stump grinding add-on to every trimming job."

  strategy_4_gift_cards:
    fit: "low"
    notes: "Gift cards for tree service are not practical. Could work as a gift-with-purchase ('refer a friend, they get $100 credit') but not as a primary fast cash vehicle."

  strategy_5_referrals:
    fit: "high"
    notes: "The highest single ROI fast cash lever. Landscapers, roofers, real estate agents, property managers, and home inspectors all see tree problems constantly. A formal referral program with defined incentives and touchpoints has almost no cost and enormous upside."

  strategy_6_flash_sales:
    fit: "medium"
    notes: "Seasonal promotions work well — 'winter removal special,' 'spring cleanup packages.' Should not be framed as discounts; better framed as scheduled services at a preferred rate. Works well for filling calendar in slow months."

  strategy_7_hidden_money:
    fit: "medium"
    notes: "Most operators have unbilled time, underpriced services, and untapped service lines (PHC, stump grinding, firewood). A revenue audit typically finds 15–25% in unrealized revenue within existing operations."

  strategy_8_subscriptions:
    fit: "high"
    notes: "Annual PHC programs, annual trimming agreements, and annual property inspection contracts are the most underutilized revenue model in tree service. Converts one-time removal clients into recurring revenue. High margin, high retention."

  strategy_9_prepaid_packages:
    fit: "medium"
    notes: "Pre-season packages (spring trimming + summer PHC treatment) improve cash flow and lock in clients before competitors can quote them. Works well for residential estate clients."

  strategy_10_financing:
    fit: "medium"
    notes: "For large removal jobs ($3,000+), financing removes a significant barrier. GreenSky, Hearth, and similar home improvement financing platforms are available and applicable. Increases close rate on high-ticket jobs."

  strategy_11_partner_marketing:
    fit: "high"
    notes: "Landscapers, roofers, real estate agents, property managers, general contractors, home inspectors, and HOA managers are all natural referral partners. A single property management company relationship can deliver $30,000–$80,000/year in work."

  strategy_12_bring_back_sooner:
    fit: "high"
    notes: "Post-job follow-up at 60 days (PHC intro) and 12 months (annual check) generates repeat business from clients who would otherwise hire whoever shows up next. Most operators never follow up."

  strategy_13_one_time_offer:
    fit: "medium"
    notes: "Seasonal urgency works — 'before the spring rush,' 'lock in your winter rate.' The contractor framing makes time-limited offers more natural than in professional services."

  strategy_14_sell_what_pays:
    fit: "high"
    notes: "Most operations should aggressively market hazardous removal, emergency response, and PHC programs — the highest-margin services. Commodity trimming can be deprioritized or referred out."

  strategy_15_teach_what_you_know:
    fit: "high"
    notes: "'How to tell if your tree is hazardous,' 'What ISA certification means,' 'Should I remove or treat this tree' — educational content at the estimate and online positions the operator as the arborist authority in the market. Most competitors produce zero educational content."

  strategy_16_keep_more_earn:
    fit: "medium"
    notes: "Job costing, crew efficiency, and equipment utilization improvements can significantly increase net margin without changing top-line revenue. Most operators run without formal job costing."

  strategy_17_marketing_calendar:
    fit: "high"
    notes: "Seasonal patterns are very pronounced. Pre-season content (late winter for spring cleanup), storm response content (spring/fall storm season), and winter dormancy content (October–November) should all be planned and in-market early."

  strategy_18_loyalty_program:
    fit: "medium"
    notes: "An annual PHC or maintenance agreement effectively IS a loyalty program. A named program ('Charter Care Program' or similar) with defined member benefits creates perceived value and improves retention."

  strategy_19_local_seo:
    fit: "high"
    notes: "Google Business Profile optimization is critically underdone in this niche. 'ISA certified arborist [city],' 'hazardous tree removal [city],' 'emergency tree service [city]' — most of these terms are low-competition in most markets."

  strategy_20_bundling:
    fit: "high"
    notes: "Removal + stump grinding + site cleanup + PHC program intro is a natural bundle that increases average job value and introduces the recurring revenue component on every new removal job."

  strategy_21_events:
    fit: "medium"
    notes: "Free 'tree health clinics' or educational events for HOA boards and property managers build authority and referral relationships simultaneously. Works well as a commercial prospect strategy."

  strategy_22_clear_inventory:
    fit: "low"
    notes: "Service business — no inventory in the traditional sense. Firewood/chip disposal can be monetized but is a secondary consideration."

  top_5_recommended:
    - strategy: 11
      name: "Partner Marketing (Referral Network Build)"
      priority: 1
      rationale: "One HOA property manager or busy landscaper relationship is worth more than any digital campaign. Formal outreach to 10–15 strategic referral partners is the highest-ROI fast cash move available. Cost: near zero."

    - strategy: 8
      name: "Annual Maintenance Agreements (PHC + Trimming)"
      priority: 2
      rationale: "Converts the existing customer base from one-time transactions to annual recurring revenue. PHC program introduced to every removal client. Immediate revenue, permanent improvement to business model."

    - strategy: 1
      name: "Past Client Reactivation"
      priority: 3
      rationale: "Every removal client from the past 3 years is a PHC, trimming, or follow-on removal prospect. A 3-touch reactivation sequence by email or direct mail costs almost nothing and has very high response rates in this niche."

    - strategy: 3
      name: "Structured Estimate Walkthrough (Upsell System)"
      priority: 4
      rationale: "A one-page property walkthrough checklist on every estimate visit increases average job ticket 30–50% with zero additional marketing spend. It is a conversion improvement, not a marketing campaign."

    - strategy: 19
      name: "Google Business Profile + Local SEO"
      priority: 5
      rationale: "Most operators have a GBP with minimal optimization and inconsistent reviews. Bring reviews to 50+, optimize categories and service descriptions, and target 'ISA certified arborist [city]' — most markets are genuinely low-competition on that term."

