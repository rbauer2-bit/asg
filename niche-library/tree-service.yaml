# ─────────────────────────────────────────
# PRIORITY SERVICES (Pre-ranked by margin + volume)
# ─────────────────────────────────────────
priority_services_archetypes:
  - rank: 1
    name: "Emergency / Storm Removal"
    why_profitable: "Premium rate (1.5–2.5x), emotionally urgent buyer, no competitive bidding"
    ideal_avatar: "Homeowner with active tree damage, insurance claim in progress"
    avg_value_range: "$1,500–$15,000+"
    margin_notes: "Highest — urgency eliminates price shopping. Most operators under-charge."

  - rank: 2
    name: "Hazardous Tree Removal"
    why_profitable: "High liability stakes justify premium pricing; ISA credential validates the risk assessment"
    ideal_avatar: "Homeowner with large dead or leaning tree near structure; insurance renewal trigger"
    avg_value_range: "$1,200–$8,500"
    margin_notes: "Strong — complexity and risk justify rate. Crane upsell common."

  - rank: 3
    name: "Plant Health Care (PHC) — Annual Program"
    why_profitable: "Recurring revenue at 60–80% gross margin; predictable; expands with property"
    ideal_avatar: "Homeowner with 5+ mature trees, estate property, commercial property manager"
    avg_value_range: "$800–$2,500/year per property"
    margin_notes: "Best long-term margin in the business. Completely underdeveloped in most operations."

  - rank: 4
    name: "Commercial / HOA Contracts"
    why_profitable: "Predictable volume, multi-property scope, annual renewals"
    ideal_avatar: "HOA property manager, commercial building owner, municipality"
    avg_value_range: "$5,000–$50,000+/year contract"
    margin_notes: "Lower per-job margin than residential but volume and predictability offset it"

  - rank: 5
    name: "Residential Trimming / Pruning"
    why_profitable: "Lower ticket but repeatable; strong referral generator; positions operator as ongoing arborist not one-time remover"
    ideal_avatar: "Homeowner 40–65, property pride, wants trees maintained annually"
    avg_value_range: "$400–$2,000"
    margin_notes: "Volume play. Anchor for recurring relationship and upsell to PHC program."

