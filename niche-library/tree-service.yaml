# ─────────────────────────────────────────
# SEASONAL PATTERNS
# ─────────────────────────────────────────
seasonal_patterns:
  peak_months: ["March", "April", "May", "September", "October"]
  slow_months: ["December", "January", "February"]
  storm_surge_regions:
    - region: "Southeast / Gulf Coast"
      timing: "June–November (hurricane season)"
    - region: "Midwest / Central"
      timing: "April–June (tornado / severe storm season)"
    - region: "Northeast"
      timing: "October–December (nor'easters / early ice storms)"
    - region: "All continental US"
      timing: "March–May (spring storm season)"

  trigger_events:
    - name: "Spring Cleanup Season"
      timing: "February–April marketing, March–May execution"
      notes: "Highest residential demand period. Content and campaigns should be in market by late February. Winter-damaged trees become visible as snow melts."

    - name: "Storm Response Surge"
      timing: "Varies by region — see above"
      notes: "Emergency response protocols, defined emergency pricing, and storm-specific content should be in market BEFORE storm season, not after."

    - name: "Fall Dormancy Window"
      timing: "October–November marketing, November–February execution"
      notes: "Best time to market winter removal advantages (dormancy = less disease transfer, visible structure, frozen ground). Operators who make this pitch fill their slow season at full rate."

    - name: "Pre-Budget HOA / Commercial Cycle"
      timing: "September–October"
      notes: "HOA boards and property managers set annual maintenance budgets in Q4. Commercial contract proposals must be in front of decision-makers by October to make it into the budget cycle."

# ─────────────────────────────────────────
# COMPLIANCE FLAGS
# ─────────────────────────────────────────
compliance_flags:
  - "No ABA compliance required — tree service is not a licensed profession under state bar rules."
  - "Cannot claim ISA certification for the individual arborist if the person named is not certified. Verify current certification status before including in copy."
  - "TCIA Accreditation is a company-level credential — requires current membership. Confirm before including."
  - "Outcome claims ('we will save your tree,' 'guaranteed no property damage') should use 'our goal,' 'in our experience,' or 'we take every precaution' framing."
  - "Storm response marketing: avoid language that could be construed as price gouging in states with anti-price-gouging statutes during declared emergencies. Emergency rate = 'premium service rate for urgent response' framing is safe."
  - "Heritage tree permits: content that references local ordinances should note that regulations vary by municipality and clients should confirm with local authorities."
  - "Referral fee arrangements: no regulated restrictions in this trade. Formal referral programs with financial incentives to landscapers, real estate agents, etc. are permissible."
