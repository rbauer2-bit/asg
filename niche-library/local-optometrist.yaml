# local-optometrist.yaml
# Authority Systems Group™ — Niche Intelligence Library
# Niche: Independent Optometrist (Premium Practice, Quality-Patient Growth)
# Prepared by: Vivienne Carr, CMO + Daniel Frost, CSO
# Reviewed by: Roger Bauer, Director

niche_id: "local-optometrist"
niche_name: "Independent Optometrist"
niche_subtype: "Independent OD with premium practice seeking quality-patient growth without volume marketing"
vertical_category: "optometry / healthcare / retail optical"
last_updated: "2026-03"

# ─────────────────────────────────────────
# NICHE CONTEXT — VIVIENNE CARR, CMO
# ─────────────────────────────────────────
# This niche requires a precision positioning play, not a lead generation campaign.
# The OD is not invisible — they are miscategorized by the market as interchangeable
# with every LensCrafters, Walmart Vision, and online eyewear retailer in the zip code.
# Patients who don't know better make decisions on price, convenience, and insurance coverage.
# The patients this OD wants — the ones who value clinical judgment, buy premium optical,
# and refer their families — are already in the market. They're just not finding this practice.
# The goal is to become the recognized eye care authority in their community:
# the doctor that quality-minded patients seek out pre-sold, pre-trusting, and already committed
# to buying their optical from the practice rather than taking the prescription to Zenni.
#
# CRITICAL NOTE: This avatar resists content creation and automation.
# Both are essential to the system — but they must be reframed and de-jargoned.
# "Content" becomes "education assets." "Automation" becomes "patient care systems."
# The OD is positioned as the approver and expert — never the content machine.
# See belief_to_buy_framework.enemy_belief_4 and enemy_belief_5 for handling these objections.

# ─────────────────────────────────────────
# TYPICAL BUSINESS PROFILE
# ─────────────────────────────────────────
typical_business_profile:
  practice_type: "Independent single-location or 2-location optometry practice"
  practice_size: "1–2 ODs, 3–7 staff (opticians, optical manager, front desk, tech)"
  avg_comprehensive_exam_fee: "$120–$250 full fee | $30–$95 insurance-reduced"
  avg_complete_pair_premium: "$450–$1,400 (frame + Rx + AR + progressive)"
  avg_complete_pair_economy: "$180–$350 (frame + single-vision Rx)"
  avg_contact_lens_annual_supply: "$300–$800 per patient"
  avg_dry_eye_treatment_case: "$500–$3,000 per patient (multiple visit protocols)"
  avg_myopia_management_annual: "$1,500–$3,000 per child (Ortho-K, MiSight, atropine protocols)"
  avg_patient_ltv: "$600–$2,200 over 5 years (exam + optical + contacts + specialty)"
  avg_overhead_percent: "58–72%"
  insurance_dependency: "VSP, EyeMed, Davis Vision — accepted by most; despised by all"
  insurance_problem: >
    Vision insurance pays $30–$80 for a service the OD invested $180,000 in education to deliver.
    The plans lock in low-margin exam volume, attract price-sensitive patients, and compress
    optical revenue by steering patients toward covered frame allowances instead of premium choices.
    The OD stays in-network because they fear volume loss. The trap is identical to dental insurance.
  optical_margin: >
    The optical dispensary is where the practice makes real money. Premium progressive lenses with AR
    carry 250–400% markup. A patient who buys premium optical from the practice is worth 3–4x one
    who just takes the prescription to Warby Parker. Attracting patients who trust and buy optical
    in-office is the single highest-leverage revenue move in this niche.
  typical_crm_and_software: "Eyefinity | RevolutionEHR | OfficeMate | Compulink | Crystal PM | No formal patient CRM"
  exam_volume_per_day: "12–20 patients"
  target_exam_volume_per_day: "8–14 premium patients (fewer chairs, higher per-patient revenue)"

  revenue_mix_current:
    - category: "Optical retail (frames + lenses)"
      revenue_share: "45–60%"
      margin: "High — 250–400% on frames, 150–300% on lenses"
      vulnerability: "Lost when patients take prescription to online retailers (Zenni, Warby Parker, 1-800-Contacts)"

    - category: "Comprehensive eye exams"
      revenue_share: "25–35%"
      margin: "Low-to-moderate — compressed by insurance reimbursements"
      notes: "The gateway service. LTV depends entirely on converting exam patients to in-office optical."

    - category: "Contact lens exams + annual supply"
      revenue_share: "10–20%"
      margin: "Moderate — eroded by 1-800-Contacts, Costco, online retailers"
      notes: "Specialty contact lenses (scleral, Ortho-K) carry dramatically higher margin and case value."

    - category: "Specialty services (dry eye, myopia management, low vision)"
      revenue_share: "5–15%"
      margin: "Very high — specialty protocols typically $1,500–$3,000+ per patient"
      notes: >
        The fastest-growing, highest-margin category in optometry.
        Almost entirely uncontested by corporate chains and online retailers.
        The one area where independent ODs have a structural advantage.

  revenue_mix_target:
    - category: "Premium optical (in-office — Maui Jim, Silhouette, premium progressives)"
      revenue_share: "55–65%"
    - category: "Specialty services (dry eye, myopia management, orthokeratology)"
      revenue_share: "15–25%"
    - category: "Comprehensive and specialty exams (fee-for-service + premium insurance)"
      revenue_share: "15–25%"
    - category: "Contact lens fittings + premium annual supply"
      revenue_share: "5–10%"

# ─────────────────────────────────────────
# PRIMARY AVATAR — "SELECTIVE SAM"
# Prepared by: Vivienne Carr, CMO
# ─────────────────────────────────────────
avatar_archetypes:

  - avatar_id: "selective-sam"
    avatar_name: "Selective Sam"
    tagline: "He built a premium practice. His marketing keeps attracting the wrong patients."
    primary_service: "Authority positioning for quality-patient growth and premium optical conversion"
    age_range: "35–54"
    gender_skew: >
      Optometry is now majority female (~67% of new ODs). Apply gender-neutral language
      throughout all client-facing content. "Sam" represents any independent OD regardless of gender.
    income_gross_collections: "$450,000–$1,200,000"
    income_net_take_home: "$130,000–$320,000"
    income_gap_note: >
      Sam sees 14 patients today. He makes $7,200 gross. After overhead, he takes home about $2,200.
      The patient who bought glasses from Warby Parker with his prescription?
      That was $600 Sam didn't collect — for a patient he already spent 40 minutes with.
      Sam knows that if just 3 more patients per day bought their optical in-office,
      his take-home would increase by $80,000 annually. That math is always in the background.
    years_in_practice: "7–22 years"
    geography: "Suburban markets and mid-sized cities — enough density, not yet dominated by chains"

    # ─────────────────────────────────────
    # CURRENT SITUATION
    # ─────────────────────────────────────
    current_situation:
      daily_reality: >
        Sam's 9am patient arrives, gets a thorough exam, leaves with a handwritten prescription
        for progressive lenses. She smiles and says "thank you, I'll think about the glasses."
        He knows she's going home to Zenni or Warby Parker. He also knows the premium Zeiss lenses
        he would have fitted her with would have been life-changing for her and $480 for his practice.
        He sees this 4–6 times a day. He's stopped trying to figure out how to stop it.

      the_core_tension: >
        Sam's clinical skills are not in question. His patients trust him in the exam room.
        The problem is what happens before they arrive and after they leave.
        Before: The patients who find him are often price-driven, insurance-first, and
        willing to go to whoever takes their plan. They don't have a reason to seek him out
        specifically until they're already sitting in his chair — and by then, the relationship
        is transactional.
        After: Without a system to stay connected, the patient who had a great experience
        simply doesn't think to refer, doesn't come back until they "need new glasses,"
        and doesn't know about the dry eye treatment or myopia management protocol
        that would genuinely improve their child's life.
        The gap is not clinical. It's the authority and relationship infrastructure
        that makes quality patients choose Sam, stay with Sam, and send everyone they know.

      what_keeps_sam_stuck:
        - "Insurance contracts pull in price-motivated patients — but dropping plans feels like financial suicide"
        - "He tried Google Ads and got calls from people asking 'do you take [discount plan]?' Not what he wanted"
        - "He tried a local SEO agency. They got him on page one. For 'eye exam near me.' Wrong patient."
        - "His current marketing attracts patients who compare him to Walmart Vision — a comparison he should never be in"
        - "He spent 8 years earning his degree — he's not making TikToks to explain it"
        - "He knows he should be doing something about patient retention, but he doesn't have time to manually follow up"
        - "He's been pitched by 4–6 consultants in the last 3 years. Every pitch led with 'more traffic' and 'more clicks'"
        - "Word of mouth is his best source of good patients — but he has no system to engineer it"
        - "His website is functional but indistinguishable from every other optometry site in his market"

    # ─────────────────────────────────────
    # GOALS AND DESIRES
    # ─────────────────────────────────────
    primary_goals:
      - "Replace 4–6 price-shopping patients per day with 2–3 quality patients who buy optical in-office"
      - "Grow premium optical conversion rate from 40–55% to 70–80% of exam patients"
      - "Build a patient base that comes in pre-trusting him — not comparing him to LensCrafters"
      - "Add 1–2 dry eye treatment cases per week without adding chair time"
      - "Be the optometrist in his community that patients specifically request — not 'whoever takes my insurance'"
      - "Engineer referrals without having to personally follow up or feel like he's begging"

    secondary_goals:
      - "Develop enough authority that he can selectively drop the most punishing insurance plans"
      - "Attract pediatric patients for myopia management — the highest-LTV patient type in optometry"
      - "Build a practice with enough brand equity that it sells at a premium valuation"
      - "Stop being squeezed by online optical retailers and insurance reimbursement schedules simultaneously"
      - "Have staff who can handle patient communication without it falling on him personally"

    financial_target:
      revenue_per_day_current: "$5,500–$7,500 gross"
      revenue_per_day_target: "$8,500–$12,000 gross (fewer exams, higher per-patient revenue)"
      key_lever_1: "Increase in-office optical conversion: 3 more premium sales/day = +$800–$1,400/day"
      key_lever_2: "Add 2 dry eye cases/week at $1,500 avg = +$156,000 annual revenue"
      key_lever_3: "5 myopia management enrollments = +$7,500–$15,000 recurring annual revenue"
      path_to_target: >
        Sam doesn't need more patients. He needs more value per patient.
        Right now, his practice captures 35–45 cents of every dollar his patients spend on vision care.
        The other 55–65 cents goes to Zenni, 1-800-Contacts, and Costco.
        Closing that gap through authority positioning, patient trust, and retention systems
        is the path to $250,000+ net income without increasing exam volume.

    # ─────────────────────────────────────
    # BELIEF-TO-BUY FRAMEWORK™ MAPPING
    # Prepared by: Vivienne Carr, CMO + Dr. Raymond Cross, Board
    # ─────────────────────────────────────
    belief_to_buy_framework:

      # BELIEF TRACK — What Sam thinks is true (and must shift)
      belief_track:

        enemy_belief_1:
          stage: "Enemy Belief"
          belief: "Marketing just attracts price shoppers. I've tried it and it brings in the wrong patients."
          why_it_stalls: >
            Sam has conflated volume marketing — the kind designed to fill chairs with any patient —
            with authority positioning, which pre-selects for quality patients in the research phase.
            Every agency he hired ran the former and called it the latter. He's made a reasonable
            conclusion from bad evidence. The enemy belief is not irrational — it's just aimed
            at the wrong category of marketing.
          pre_frame_needed: >
            Draw the line between volume marketing (clicks, impressions, 'new patient volume')
            and authority positioning (pre-sold patients who already trust you before they call).
            The type of patient you attract is determined by what you say, not how loud you say it.
            Sam isn't attracting price shoppers because he's marketing. He's attracting price shoppers
            because his market positioning — his website, his reviews, his online presence —
            looks identical to a practice that competes on price.

        enemy_belief_2:
          stage: "Enemy Belief"
          belief: "Good patients come from referrals. I can't really control that."
          why_it_stalls: >
            Sam's best patients do come from referrals. He has correctly identified the channel —
            and incorrectly concluded it's unengineerable. He treats word-of-mouth as a weather event:
            it happens when it happens. The result is feast-or-famine quality patient flow,
            with no system to accelerate, replicate, or sustain it.
          pre_frame_needed: >
            Referrals are engineerable. They happen more often when patients have a specific reason
            to refer (a memorable experience, a specific service that changed their vision,
            a clear articulation of what makes this practice different from the alternative).
            Authority positioning gives existing patients the language and the prompt to refer.
            It doesn't ask them to be salespeople. It gives them a story worth telling.

        enemy_belief_3:
          stage: "Enemy Belief"
          belief: "I can't drop insurance plans — I'd lose too many patients."
          why_it_stalls: >
            Insurance dependency is the cage. As long as Sam believes his revenue floor requires
            insurance volume, he will keep attracting the patient profile that insurance delivers:
            price-first, plan-first, loyalty-last. This belief is partially accurate in the short term
            and completely limiting in the long term. It keeps him competing in the wrong lane.
          pre_frame_needed: >
            Authority positioning is the bridge out of insurance dependency — not a cliff.
            When enough patients choose Sam specifically (not because he's on their plan,
            but because he's the trusted authority), he can selectively exit the worst-paying plans
            without revenue impact. The sequence matters: position first, exit second.
            No one successfully drops insurance without first building a reason patients will pay.

        enemy_belief_4:
          stage: "Enemy Belief"
          belief: "I'm not going to record videos or post on social media every day. That's not who I am."
          why_it_stalls: >
            This is the most common authority-building objection in the OD niche — and the most valid.
            Sam is a clinician, not a content creator. If authority building requires him to become
            a TikTok personality, it will never happen. He doesn't have the time, the inclination,
            or the identity for it. Forcing a content-creation model on this avatar kills the engagement
            before it starts.
          pre_frame_needed: >
            Authority is not the same as visibility. You don't need to be on social media every day.
            You need your expertise to be legible in the moments when quality patients are researching
            and deciding. Your clinical knowledge becomes patient education assets — written, formatted,
            and published by ASG's content team, reviewed and approved by you. You are the expert
            whose name is on the content. You are not the content machine.
            The OD's role: provide judgment and approve. ASG's role: translate that into the assets
            that make quality patients choose you before they call anyone else.
          asg_handling_note: >
            NEVER pitch this avatar with "content calendar," "social media management," or
            "posting strategy." Frame all content as clinical authority assets and patient education.
            Lead with outcomes (patients who arrive pre-trusting, pre-qualified) not activities
            (posts per week, video frequency). Sam doesn't care about the output — he cares
            about which patients walk through the door.

        enemy_belief_5:
          stage: "Enemy Belief"
          belief: "Automation is impersonal. My patients know me. I don't want to feel like a robot sending them emails."
          why_it_stalls: >
            Sam's concern is legitimate. Bad patient automation is impersonal, generic, and erodes
            the trust he has built through years of clinical care. He has probably received
            bad examples of it — generic appointment reminders, mass-blast emails, "Dear Patient" letters.
            His instinct to protect patient relationships from that kind of damage is exactly right.
          pre_frame_needed: >
            The alternative to systematized patient care is not personal care — it's no care.
            Patients who don't hear from Sam's practice after their exam simply drift.
            They go to LensCrafters next year because it was convenient. They forget about the
            dry eye treatment he mentioned. They don't think to refer their daughter for myopia management.
            A well-built patient care system — one that sounds like it came from Sam's practice,
            uses the patient's actual name, references their actual visit, and is timed to
            moments that matter — is not a robot. It is the thoughtful practice Sam runs,
            extended beyond his chair time. The framing is everything.
          asg_handling_note: >
            Never use the word "automation" with this avatar. Use "patient care systems,"
            "relationship infrastructure," or "your practice staying in touch — without it
            falling on you personally." Lead with the patient experience, not the mechanism.

        new_worldview_target: >
          "I don't need more patients. I need the right patients — the ones who value clinical expertise,
          trust my optical recommendations, refer their family, and come back every year.
          Those patients exist in my market. I need them to find me first, not stumble across me
          while comparing prices. That's a positioning problem. And positioning is solvable."

        internal_alignment_signal: >
          Sam starts talking about specific patients he wishes he had more of.
          "I have this one family — they've been coming for 12 years, they buy everything here,
          they've sent me probably 15 referrals. If half my practice was like them, I'd work 3 days
          a week and make more than I do now." He's describing the positioning outcome, not the tactics.
          That's alignment.

        certainty_triggers:
          - "Seeing a case study of an independent OD in a comparable market who shifted patient mix without increasing ad spend"
          - "Understanding that authority positioning pre-selects for the patient type — before they call"
          - "Hearing that the content system does NOT require them to record videos or run social media personally"
          - "Seeing specific examples of patient education assets and understanding the OD's role is to approve, not create"
          - "Hearing the word 'automation' replaced with 'patient care systems' and understanding what that actually looks like"
          - "Understanding that LTV-based marketing is structurally different from new-patient-volume marketing"

      # EMOTION TRACK — What Sam feels is true (and must shift)
      emotion_track:

        dissatisfaction:
          current_pain: >
            Sam's 2pm slot just canceled. Again. He knows her — she came in last year, liked him,
            but chose Costco this year because it was "more convenient." He didn't have a reason
            in her mind to come back to him specifically. She's not a bad person. He just never
            gave her a compelling reason. His schedule has 4 empty slots this week.
            His overhead doesn't.
          emotional_state: >
            Quietly frustrated. Not panicked — his practice is fine. But fine isn't the goal.
            He's building something he's proud of, and the market isn't recognizing it.
            He suspects the patients who would value what he does are out there —
            they're just walking past his practice on the way to somewhere else.

        contrast:
          the_pivot_moment: >
            A patient comes in and says: "My colleague told me you're the person to see for dry eye.
            She said you actually fixed it — not just sold her drops."
            The patient books three sessions. Spends $1,800. Sends her husband the next month.
            Sam walks out of that day thinking: "That's what I want more of.
            That patient came in pre-sold. I didn't have to explain myself at all."
            He's felt this before. He can't figure out how to engineer it.

        desire:
          what_sam_wants_to_feel: >
            A schedule with 10 patients who chose him specifically.
            Patients who ask for his recommendation on frames — and take it.
            A front desk that isn't fielding calls from "what does my insurance cover."
            Enough referral inflow that he's selective about which new patients he accepts.
            Walking out by 4pm having made $9,500 gross.
            Being introduced at a community event as "the eye doctor everyone recommends."

        urgency:
          what_accelerates_the_decision: >
            Warby Parker just opened a store two miles from his office.
            A private equity-backed regional chain is expanding into his market.
            His optical revenue is down 11% year-over-year as more patients take prescriptions online.
            Three of his best patients have moved to the new ophthalmology group that
            "does everything under one roof." He is not in a crisis. But he can see it from here.
            Doing nothing is a slow erosion, not a stable floor.

        relief:
          what_the_right_solution_feels_like: >
            The version of Sam's practice that authority positioning builds doesn't compete with
            Warby Parker or Walmart Vision — it doesn't even occupy the same category in patients' minds.
            Premium patients seek it out. The optical conversion rate is 72%.
            Dry eye patients arrive having already decided. Myopia management families are on a waitlist.
            Sam works 4 days a week, sees 10 patients a day, and nets more than he does now seeing 16.
            The chart is simple: fewer patients, more revenue per patient, higher satisfaction.
            That is not a fantasy. It is a positioning problem with a solution.

    # ─────────────────────────────────────
    # WHAT SAM HAS ALREADY TRIED
    # ─────────────────────────────────────
    prior_solutions_tried:
      - solution: "Local SEO agency"
        result: "Ranked higher for 'eye exam near me.' Got more insurance-first calls. Not the right patient."
        residual_belief: "SEO brings in whoever is searching for the cheapest exam — not quality patients"
        note: >
          SEO itself is not the problem — the keyword targeting was wrong.
          'Eye doctor for dry eye [city]' and 'best optometrist [city]' attract different patients
          than 'eye exam near me.' Authority positioning changes what you rank for, not just how high.

      - solution: "Google Ads / PPC"
        result: "Spent $600–$1,500/month. Calls from people asking 'do you take [discount vision plan]?'"
        residual_belief: "Ads attract price shoppers — not the patients I want"

      - solution: "Facebook Ads / Instagram"
        result: "Ran promotions. Got some new patients. Most bought one pair of glasses and never came back."
        residual_belief: "Social media brings in one-timers — they don't become loyal patients"

      - solution: "A new website"
        result: "Looks professional. Still says 'comprehensive eye care for the whole family.' Doesn't differentiate."
        residual_belief: "The website is fine — the problem is something else"
        note: "The website is not fine. It is indistinguishable from every other practice in the market."

      - solution: "Practice management software's built-in recall / reminder system"
        result: "Sends appointment reminders and recall notices. Generic. Patients ignore or unsubscribe."
        residual_belief: "Automated messages feel impersonal — patients know it's a system, not a person"

      - solution: "Health system / hospital referral relationships"
        result: "Gets some referrals from PCPs. Inconsistent. Takes years to build."
        residual_belief: "Medical referrals are the gold standard but they're slow and unpredictable"

      - solution: "Hiring a front desk person to 'do social media'"
        result: "Posted a few times. Generic posts about eye health awareness. No discernible patient impact."
        residual_belief: "Social media doesn't really move the needle for a local practice like mine"

      - solution: "Local newspaper / mailer / community advertising"
        result: "Name recognition marginally improved. No measurable new patients of note."
        residual_belief: "Traditional advertising wastes money and attracts discount-seekers"

      - solution: "Patient satisfaction surveys / NPS"
        result: "Got good scores. A few reviews. No system to convert satisfaction into referrals or growth."
        residual_belief: "Patients are happy — I just can't figure out how to turn that into more of the right patients"

    # ─────────────────────────────────────
    # OBJECTIONS TO ADDRESS
    # ─────────────────────────────────────
    objections:

      - objection: "I've already spent money on marketing and it brought in the wrong patients."
        underlying_fear: "I'll spend another $20,000 and still be stuck with the same problem."
        reframe: >
          What didn't work was positioning you as a commodity competing on price and convenience.
          That is exactly what SEO-for-exam-volume and generic ad campaigns do.
          Authority positioning does the opposite: it pre-selects for patients who are making a
          trust-based decision, not a price-based one. Before they call, they already know you're
          the right choice. The comparison category changes. The patient type changes with it.

      - objection: "I don't have time to create content or manage a social media presence."
        underlying_fear: "This is going to become another thing I have to do personally, on top of everything else."
        reframe: >
          You won't be creating content. You'll be approving it.
          Your clinical expertise — your philosophy about dry eye, about myopia in children,
          about why certain lenses matter — becomes the authority content that your team
          writes and publishes under your name. Your role is 20 minutes of review and
          sign-off. The content engine runs without requiring you to be in it.

      - objection: "I don't want to do heavy follow-up with patients. That's not my style."
        underlying_fear: "I'll feel like I'm pestering people or being a salesperson."
        reframe: >
          The patients who matter don't experience well-timed, relevant communication as pestering.
          They experience it as the practice remembering them.
          A note that says "Your daughter's myopia has been stable for 8 months — here's what that means"
          is not a sales pitch. It's clinical care delivered outside the exam room.
          The difference between annoying follow-up and appreciated communication is relevance and timing.
          We build the latter.

      - objection: "I don't want to automate my patient relationships. It feels impersonal."
        underlying_fear: "My patients know me personally. I don't want them to feel like they're just a number."
        reframe: >
          The question isn't automation vs. personal care. It's: what happens to your patient
          relationships when there is no system at all?
          Right now, 40% of your patients don't come back the following year.
          Not because they had a bad experience — because no one from your practice
          reached out in a way that mattered to them.
          A well-built patient care system doesn't replace your personal care.
          It extends it to the 8,760 hours of the year you're not in the exam room.

      - objection: "I've been pitched by a lot of marketing consultants. What makes you different?"
        underlying_fear: "Another agency that promises quality patients and delivers clicks and followers."
        reframe: >
          Every agency you've worked with was optimizing for volume metrics — traffic, clicks,
          impressions, 'new patients.' We don't measure any of those things.
          We measure patient quality signals: in-office optical conversion rate, LTV per patient,
          specialty case uptake, and referral source concentration.
          Our work is successful when the patients who find you are already convinced before they call.
          That is a different goal, built with a different system.

      - objection: "My best patients come from referrals. I just need more of that."
        underlying_fear: "I know what works — I just can't figure out how to get more of it."
        reframe: >
          You're right that referrals are the best source. You're missing the system that
          makes referrals happen more often, more consistently, and more specifically.
          Right now, referrals happen because a patient had a great experience and happened to
          mention it. The system we build makes those moments happen more predictably:
          a post-dry-eye-treatment follow-up that asks patients to share their experience,
          a pediatric myopia welcome kit that parents naturally share with other parents,
          specific touchpoints designed to give your satisfied patients a reason and a mechanism to refer.
          Engineering the referral doesn't make it feel less genuine. It makes it happen more often.

    # ─────────────────────────────────────
    # TRUSTED CONTENT CHANNELS
    # ─────────────────────────────────────
    trusted_content_channels:
      primary:
        - "Google Search (when patients are researching specific conditions: dry eye, myopia, specialty contact lenses)"
        - "Optometry peer networks — Review of Optometry, Optometry Times, AOA news"
        - "Practice management conferences — AAOpt, SECO, Vision Expo"
        - "Peer ODs in non-competing markets (informal advice and referrals at CE meetings)"
        - "Patient-generated reviews on Google Business Profile"

      secondary:
        - "LinkedIn (primarily for professional reputation among medical referral sources)"
        - "Facebook community groups (patients often ask for recommendations here — OD is not present but patients are)"
        - "Optometry-specific Facebook Groups (ModernOptometry, Dry Eye Mastermind, etc.)"
        - "Optical industry publications (20/20 Magazine, Vision Monday, Eyecare Business)"
        - "Optometry school alumni networks"

      influencers_and_trust_sources:
        - "Colleagues who successfully navigated insurance independence or specialty service launch"
        - "Practice management consultants with optometry-specific track records (Invision, Williams Group)"
        - "Academic ODs or residency directors (strong clinical credibility signal)"
        - "Lens and equipment reps (often the first people to introduce new business models)"
        - "Happy patients who directly recommend — 'you should see my eye doctor' remains the highest-trust channel"

    # ─────────────────────────────────────
    # LANGUAGE SAM USES
    # ─────────────────────────────────────
    voice_and_language:
      industry_terms_he_uses:
        - "Chair time" (the scarce resource)
        - "Optical conversion" or "capture rate" (% of exam patients who buy optical in-office)
        - "Recall" (patient retention / annual re-examination scheduling)
        - "Medical billing" (billing eye disease management to medical insurance — higher reimbursement)
        - "DED" or "dry eye disease" (the specialty diagnosis, not 'dry eyes')
        - "Myopia management" / "orthokeratology" / "Ortho-K" / "MiSight"
        - "Premium progressives" / "free-form lenses" / "digital surfaced"
        - "AR" (anti-reflective coating — primary upgrade category)
        - "Plano sunwear" (non-prescription sunglasses — premium retail opportunity)
        - "Complete pair" (frame + lenses as a bundle — optical retail terminology)
        - "OD" (doctor of optometry — how he refers to himself professionally)
        - "Specialty contact lenses" (sclerals, RGPs, custom hydrogels — high margin, high complexity)
        - "VSP" / "EyeMed" / "Davis" (the major vision insurance plans he loves to hate)
        - "VCP" (vision care plan — Sam's polite term for what he privately calls a cage)
        - "Dilated fundus exam" / "OCT" / "visual field" (clinical vocabulary that signals thoroughness)
        - "New patient mix" (the ratio of quality patients to insurance-first patients)
        - "Frame board" (the optical display — his biggest retail variable)
        - "LTV" or "lifetime value" (Sam thinks in these terms, especially after being burned by volume)

      how_he_talks_about_the_problem:
        - "I'm tired of seeing patients who just want the cheapest glasses"
        - "My best patients send me referrals — I just can't figure out how to get more of them"
        - "I keep losing optical sales to Warby Parker and Zenni"
        - "I want patients who trust my recommendations — not patients who just want to use their benefits"
        - "My practice is good. The market just doesn't see it that way yet"
        - "I've tried marketing and it just brings in price shoppers"
        - "I don't want to be on social media — I want my work to speak for itself"
        - "I need a way to stay in touch with patients that doesn't feel like spam"

      how_NOT_to_talk_to_sam:
        - "Do not lead with 'new patient volume' — he wants quality, not quantity"
        - "Do not use the word 'automation' without immediately reframing as patient care systems"
        - "Do not pitch social media management or content calendars as the lead value"
        - "Do not lead with clicks, impressions, or website traffic — he has been burned by these metrics"
        - "Do not compare him to LensCrafters or corporate chains — the comparison offends him"
        - "Do not pitch follow-up sequences as 'lead nurturing' — he is not running a sales funnel; he is a doctor"
        - "Do not be aggressive or high-pressure — he specifically does not want to feel like he is being sold to"
        - "Do not use 'growth hacking,' 'scaling,' or startup-culture language — he runs a professional practice"

    # ─────────────────────────────────────
    # WHAT A WIN LOOKS LIKE
    # ─────────────────────────────────────
    definition_of_a_win:
      three_month_win: >
        Google Business Profile generating 2–3 new quality patient calls per week from
        condition-specific searches (dry eye, myopia management, specialty contacts).
        In-office optical conversion rate moves from 52% to 58%+.
        At least one dry eye case initiated from a patient who read an education asset before calling.
      six_month_win: >
        Referral volume from existing patients up measurably.
        1–2 myopia management enrollments per month.
        At least one insurance plan Sam has been considering dropping — he now has enough
        quality patient volume to make the decision confidently.
        Front desk reporting that new patients frequently say "I heard you're the best for [specific thing]."
      twelve_month_win: >
        Sam works 4 days per week. Gross collections are up 15–25% on the same or fewer exams.
        In-office optical capture rate at 68%+. Dry eye cases represent 12%+ of revenue.
        His practice has a specific thing it is known for in his community.
        New patients arrive having already researched him, already trusting him,
        already planning to buy their optical there.
        He turns away one insurance plan without anxiety.

      the_moment_sam_knew_it_worked: >
        A new patient calls and says: "I've been dealing with dry eye for two years.
        Three different doctors gave me artificial tears. Someone in my neighborhood Facebook group
        said you actually treat the cause — that you're the person to see for this.
        I want to come in. I'm ready to do whatever it takes."
        That call is the system working. She didn't compare prices. She didn't ask about insurance first.
        She arrived pre-sold and pre-qualified. Sam did 90 minutes of clinical work.
        He collected $1,400. She referred her husband the next month.

  # ─────────────────────────────────────────
  # SECONDARY AVATAR — "SPECIALTY-PIVOT SOPHIA"
  # ─────────────────────────────────────────
  - avatar_id: "specialty-pivot-sophia"
    avatar_name: "Specialty-Pivot Sophia"
    tagline: "She's done building a general practice. She wants to build a specialty-driven one."
    primary_service: "Authority positioning for dry eye clinic and myopia management launch"
    age_range: "32–48"
    gender_skew: "Majority female in this segment — newer OD, specialty-trained or specialty-curious"
    years_in_practice: "5–15 years"

    current_situation: >
      Sophia completed CE training in dry eye disease management or myopia control,
      invested in the diagnostic equipment (LipiFlow, OCULUS Keratograph, corneal topographer),
      and launched a specialty service. Six months in, she has a functional protocol
      but her patient pipeline doesn't know it exists. She's seeing 2–3 dry eye cases per month
      when she needs 8–10 to cover the equipment investment and justify the overhead.
      The problem is not clinical readiness — it's that her market doesn't know to seek her out for it.

    primary_motivations:
      - "Make the specialty equipment investment pay back within 18–24 months"
      - "Build a reputation as the dry eye or myopia management specialist in her market — not just an OD who 'also does that'"
      - "Exit the commodity exam model and build a practice where clinical skill is the differentiator"
      - "Create a referral pipeline from ophthalmologists, PCPs, and pediatricians for specialty cases"
      - "Attract motivated patients who are willing to invest in their vision — not just use their benefits"

    key_differences_from_selective_sam:
      - "More comfortable with content and digital channels — grew up in the social media era"
      - "Less jaded about marketing — has not been burned as many times yet"
      - "More focused on specialty positioning than general premium differentiation"
      - "Equipment investment creates urgency — the ROI math is pressing"
      - "Often building a referral network from scratch — less established than Sam"

    belief_barriers:
      enemy_belief_primary: >
        "Patients don't know what dry eye disease management is. I have to educate my whole market
        from scratch — that takes years."
      reframe: >
        The market doesn't need to understand dry eye management before they seek Sophia out.
        They need to understand their symptoms: tired eyes, burning, fluctuating vision, dependence
        on eye drops, discomfort with contact lenses. These symptoms are widely experienced and
        widely under-treated. Authority content that describes the symptoms and offers a solution
        intercepts patients at the moment of frustration — they don't need to know the clinical term
        before they call. Sophia just needs to show up in the conversation they're already having.
      enemy_belief_secondary: >
        "I don't have enough reviews or case studies yet to be seen as a specialist."
      reframe: >
        Authority is built forward, not backward. The practices that dominate their niche
        did not wait until they had 200 cases before positioning themselves as specialists.
        They positioned early and the cases followed. The first 10 dry eye cases Sophia treats
        with genuine outcomes become the foundation of a patient story library that drives the next 100.
        Start positioning. Document outcomes. The authority builds as the cases build.

# ─────────────────────────────────────────
# COMPETITIVE LANDSCAPE — DANIEL FROST, CSO
# ─────────────────────────────────────────
competitive_landscape_patterns:
  common_competitor_weaknesses:
    - "Corporate chains (LensCrafters, Visionworks, MyEyeDr, Walmart Vision) market on price, convenience, and insurance acceptance — not clinical expertise. Premium patients who value expertise actively distrust corporate feel."
    - "Online retailers (Warby Parker, Zenni, 1-800-Contacts) have taken optical retail share — but they cannot replicate clinical care, specialty services, or trusted professional relationships"
    - "The typical independent OD in any given market has a generic website, no educational content presence, and a Google profile with fewer than 30 reviews"
    - "Ophthalmology practices that perform medical eye care rarely compete for the routine vision care and optical retail market — they occupy a different lane"
    - "Almost no independent OD in any suburban market has positioned themselves as the recognized authority for a specific condition or service type"
    - "Most OD marketing, where it exists, is aimed at driving exam volume — not attracting a specific patient profile"

  typical_positioning_gaps:
    - "'Dry eye specialist [city]' is almost universally uncontested as an authority position in small and mid-sized markets"
    - "'Myopia management [city]' and 'children's vision [city]' are growing search categories with no dominant independent OD voice in most markets"
    - "The moment between symptom awareness ('my eyes are so dry and tired all the time') and care-seeking is almost entirely unaddressed by any local OD content"
    - "Google Business Profile reviews for specialty services are nearly always nonexistent — all reviews are generic 'great eye doctor' — no condition-specific social proof"
    - "Medical provider referral relationships are almost universally underdeveloped — PCPs refer to ophthalmology because OD specialty positioning doesn't reach them"
    - "No independent OD is publishing consistent patient education content that positions them as the trusted resource before a patient ever calls"

  authority_gaps:
    - "Condition-specific educational content (dry eye, myopia, specialty contact fitting) — virtually absent among independent ODs in most markets"
    - "Review systems that generate condition-specific social proof ('Dr. X changed my dry eye, I had the same drops for years') — rare"
    - "Patient referral systems that convert satisfied specialty patients into active referral sources — almost never formalized"
    - "Medical provider outreach that positions the OD as the referral destination for ocular surface disease or pediatric myopia — mostly untapped"
    - "Before/after outcome documentation for specialty services — very rarely compiled into marketing assets"

# ─────────────────────────────────────────
# FAST CASH STRATEGY FIT RATINGS
# Prepared by: Tanya Blackwood, CRO
# ─────────────────────────────────────────
fast_cash_strategy_fit:

  strategy_1_wake_past_clients:
    fit: "critical — highest priority"
    notes: >
      Every independent OD has patients who have not returned in 12–24 months.
      Most practices have 300–800 lapsed patients whose recall is overdue.
      A reactivation sequence specifically addressed to patients who are past due
      for their annual exam or contact lens evaluation is the single fastest
      near-zero-cost revenue action in this niche.
      Additional high-value segment: patients who received a dry eye diagnosis
      or discussion but never booked treatment. These are pre-diagnosed, pre-interested,
      and the softest possible sales conversation.

  strategy_2_raise_prices:
    fit: "high"
    notes: >
      Most independent ODs have not raised exam fees in 2–4 years.
      A 10–15% exam fee increase paired with stronger positioning and patient communication
      rarely causes material patient loss among quality patients.
      Premium patients are not price-comparing exam fees. They are paying for trust.
      Higher fees signal higher value — especially for specialty services.

  strategy_3_upsell_existing:
    fit: "critical — highest priority"
    notes: >
      In-office optical conversion and lens upgrade rate are the highest-leverage fast cash moves
      in this practice type. The patient is already in the chair. The trust is already established.
      The gap is in the recommendation process and the patient education at the point of purchase.
      Structured optical consultation training for optical staff — specifically the AR,
      progressive lens, and blue light protection conversation — moves conversion rate
      measurably within 30 days.
      Second lever: dry eye and specialty service awareness for existing patients who have
      reported symptoms but never been formally triaged for treatment.

  strategy_4_gift_cards:
    fit: "moderate"
    notes: >
      Gift cards for comprehensive eye exams or optical styling sessions work well
      as premium gifting vehicles for existing patients. Frame as a patient appreciation
      mechanism for referrals, not a discount tool.

  strategy_5_referrals:
    fit: "critical — highest priority"
    notes: >
      Three channels: (1) Patient-to-patient — existing satisfied patients,
      especially specialty care patients (dry eye, Ortho-K families) are highly motivated referrers.
      (2) Medical provider loop — PCPs, endocrinologists, rheumatologists, neurologists
      all have patients with ocular surface conditions. A formal referral introduction
      to these providers is largely untapped and produces very high-quality patient flow.
      (3) Pediatrician loop — myopia management referrals from pediatric practices
      represent some of the highest LTV patients in the optometry patient universe.

  strategy_6_flash_sales:
    fit: "low"
    notes: >
      Discounting eye exams or optical attracts the exact patient profile Sam wants to avoid.
      A 'complimentary dry eye assessment' or 'myopia consultation for children' is acceptable
      as a conversion tool but must be framed as clinical value, never as a discount.

  strategy_7_hidden_money:
    fit: "high"
    notes: >
      Most optometry practices have significant unbilled or under-coded medical eye care.
      Conditions like dry eye disease, blepharitis, conjunctivitis, glaucoma suspect,
      and diabetic retinopathy examination are medically billable (to medical insurance)
      at significantly higher reimbursement than vision plan allowances.
      An insurance and billing audit for medical billing opportunities typically surfaces
      $15,000–$40,000 in recoverable annual revenue that is currently being left uncoded.

  strategy_8_subscriptions:
    fit: "high"
    notes: >
      An in-house vision wellness membership plan for uninsured or underinsured patients
      (annual exam + frame allowance + contact lens benefit for a monthly fee)
      creates predictable recurring revenue, removes price-shopper behavior,
      and increases patient retention dramatically.
      Also applicable: dry eye disease management subscription protocols
      (quarterly in-office treatment + monthly product supply).

  strategy_9_prepaid_packages:
    fit: "high"
    notes: >
      Dry eye treatment packages (initial assessment + 3-session protocol + maintenance supply)
      presented as a complete solution improve case acceptance significantly.
      Myopia management annual enrollment packages (annual monitoring + lens supply)
      create predictable revenue streams and reduce per-visit friction.

  strategy_10_financing:
    fit: "high"
    notes: >
      The #1 stated objection to premium optical and specialty services is perceived cost.
      Offering simple 0% financing (CareCredit, GreenSky) at the point of optical sale
      increases premium lens capture dramatically — a $900 progressive becomes $75/month.
      Very few independent ODs have this conversation proactively.

  strategy_11_partner_marketing:
    fit: "high"
    notes: >
      Medical provider partnerships are underutilized and high-quality patient sources:
      endocrinologists and PCPs for diabetic eye exam referrals (medically necessary, recurring),
      rheumatologists for dry eye patients (Sjögren's syndrome, lupus),
      pediatricians for myopia management referrals,
      allergists for chronic ocular allergy patients.
      Introduction letters from Sam to these providers, positioned as a clinical partnership,
      not a marketing pitch, open referral relationships that produce quality patients for years.

  strategy_12_bring_back_sooner:
    fit: "high"
    notes: >
      Dry eye disease patients, myopia management patients, and specialty contact lens wearers
      all have medically justified more-frequent recall intervals.
      Moving these patients from annual to semi-annual or quarterly touchpoints
      both improves clinical outcomes and doubles the visit revenue from this segment.

  strategy_13_one_time_offer:
    fit: "low"
    notes: "FOMO urgency tactics are inappropriate for clinical care and erode the premium positioning being built."

  strategy_14_sell_what_pays:
    fit: "critical — core strategy"
    notes: >
      The optometry revenue Pareto is stark: premium optical, specialty services, and
      medical eye care generate 3–5x the per-hour revenue of routine insurance exams.
      Yet most OD schedules allocate more time and energy to the low-margin segments.
      A service-line revenue-per-chair-hour analysis almost always reveals the same pattern:
      the 20% of services that drive 60%+ of margin are underinvested in, underpromoted,
      and not systematically offered. Realigning the practice model around these services
      is the foundation every other strategy is built on.

  strategy_15_teach_what_you_know:
    fit: "high"
    notes: >
      Patient education events ('Living With Dry Eyes — A Free Information Evening' or
      'What Every Parent Should Know About Myopia in Children') convert at high rates.
      These events attract self-selecting audiences who are already symptomatic or concerned.
      One event with 12–15 attendees typically produces 4–7 clinical consultations.
      They also generate community authority positioning that no ad campaign can replicate.

  strategy_19_local_seo:
    fit: "critical — highest priority"
    notes: >
      Condition-specific searches ('dry eye treatment [city],' 'myopia management for kids [city],'
      'eye doctor for dry eyes near me') are high-intent and almost entirely uncontested
      in most markets. Google Business Profile optimization for these specific conditions —
      through targeted review acquisition and Q&A content — consistently produces
      measurable condition-specific patient flow within 60–90 days.

  top_5_recommended:
    - strategy: 1
      name: "Reactivate Lapsed Patients + Dry Eye Pre-Diagnosed"
      priority: 1
      rationale: >
        The fastest near-zero-cost revenue in the practice.
        Lapsed annual exam patients + dry eye-diagnosed but untreated patients are the warmest
        possible list. A 3-touch reactivation sequence to these patients consistently returns
        4–8 bookings per 100 contacts. Cost: the time to write the sequence.

    - strategy: 14
      name: "Sell What Pays — Pareto the Practice"
      priority: 2
      rationale: >
        Until Sam sees the per-chair-hour revenue breakdown by service line,
        he continues allocating his most valuable resource — his time — equally across
        services that have dramatically different margin profiles. This analysis
        is the strategic foundation for every other decision.

    - strategy: 3
      name: "In-Office Optical Conversion System"
      priority: 3
      rationale: >
        The optical conversation happens after every exam — but most practices leave it
        to chance. A structured optical consultation process, trained into staff,
        with clear recommendation language for each lens upgrade category, moves
        capture rate from the typical 45–55% to 65–75%+ within 30–60 days.
        At 15 exams per day, 2 more captures = $600–$900 more per day.

    - strategy: 19
      name: "Local SEO for Condition-Specific Searches"
      priority: 4
      rationale: >
        'Dry eye specialist [city]' and 'myopia management [city]' are high-intent,
        low-competition, and almost always unowned by any local practice.
        Owning these search positions produces a fundamentally different patient:
        someone researching a specific problem who is already motivated to solve it.
        This is the structural patient quality upgrade Sam has been looking for.

    - strategy: 5
      name: "Activate Specialty Patient Referral + Medical Provider Loop"
      priority: 5
      rationale: >
        Every dry eye patient Sam has successfully treated is a referral engine.
        Most have never been asked. A simple post-treatment outcome sequence
        that invites patients to share their experience — and provides the specific language
        to do it — activates the referral channel that produced Sam's best patients in the first place.
        Medical provider outreach runs in parallel and produces referrals with multi-year LTV.

# ─────────────────────────────────────────
# CONTENT INTELLIGENCE
# Prepared by: Vivienne Carr, CMO
# ─────────────────────────────────────────
content_topics_bank:

  content_framing_note: >
    All content for this niche must be framed as patient education and clinical authority —
    never as marketing. The OD's name and expertise are on the content.
    The content team writes and publishes. The OD approves.
    Never pitch content as "social media posts" to this avatar — pitch it as
    "patient education assets that build trust before patients call."

  authority_themes:
    - "Why your chronic dry eye isn't going to improve with more eye drops — and what actually treats it"
    - "The truth about online eyeglasses: what you're giving up when you skip the fitting"
    - "Why your child's glasses prescription keeps changing — and what you can do about it"
    - "The difference between an eye exam and a comprehensive vision evaluation"
    - "3 things your eye doctor learns from your eyes about your overall health"
    - "When 'my eyes are just tired' is actually a diagnosable condition"
    - "What premium progressive lenses actually do differently — a plain-English explanation"
    - "Why the cheapest eye exam is often the most expensive decision you'll make"

  belief_shifting_content:
    - "I thought dry eye was just something I had to live with — here's what changed"  # patient voice
    - "Is online eyewear really worth what you save? An honest breakdown"
    - "Why I tell parents: the earlier you catch myopia, the more vision you save"
    - "The one question I ask every new patient that changes their care plan"
    - "What 'complete eye exam' actually means — and why not all of them are the same"

  objection_rebuttal_topics:
    - "Is dry eye treatment worth the cost? What patients tell me after six months"
    - "Can contact lenses really slow down myopia in my child? What the research shows"
    - "Why does my eye exam cost more than my primary care visit? A transparent answer"
    - "I got my prescription from [online retailer] — why do my glasses not feel right?"
    - "Is there a difference between the eye doctor at Costco and an independent optometrist? Honest answer."

  social_proof_angles:
    - "Patient had been using eye drops every 30 minutes for three years. Now she uses them twice a day — maybe."
    - "Her son's myopia was progressing fast. Ortho-K stopped it. His prescription barely changed in 18 months."
    - "He bought glasses online twice. Neither pair felt right. One appointment changed that."
    - "She came in expecting another eye exam. She left with a diagnosis and a treatment plan for a condition she'd had for years."

  educational_hooks:
    - "3 signs your 'dry eyes' are actually dry eye disease — and what the difference means for your treatment"
    - "At what age does myopia typically stop progressing? The answer may change how you think about your child's care."
    - "The ingredient in most OTC eye drops that may actually be making your dry eye worse"
    - "How an eye exam can detect early signs of diabetes, hypertension, and multiple sclerosis"
    - "What I look for in the first 5 minutes of an eye exam that most doctors miss"  # OD authority voice

  content_for_sam_as_the_protagonist:
    notes: >
      Content positioning Sam as an educator and trusted local authority — not as a service provider.
      Sam reviews and approves; the content team writes.
      This is the content that produces the 'pre-sold' patient Sam describes as his ideal.
    formats:
      - "Google Business Profile Q&A: answered clinical questions about dry eye, myopia, specialty lenses — built for local search"
      - "Patient education one-pagers: dry eye self-assessment, myopia risk factors, premium lens guide — distributed in-office and linked from website"
      - "Website: dedicated condition-specific pages (dry eye, myopia management) written to convert a researching patient, not just describe services"
      - "Email recall sequences: condition-specific, clinically relevant, timed to annual recall windows — not generic reminders"
      - "Google review response system: each review response reinforces Sam's clinical expertise and specialty positioning"
      - "Medical provider letter: formal introduction to PCPs, pediatricians, rheumatologists — positions Sam as the referral destination for specific conditions"

# ─────────────────────────────────────────
# SEASONAL PATTERNS
# ─────────────────────────────────────────
seasonal_patterns:
  peak_months: ["January", "February", "March", "August", "September", "October"]
  slow_months: ["April", "May", "November", "December"]

  trigger_events:
    - name: "Vision Benefits Reset"
      timing: "January – March"
      notes: >
        Most VSP and EyeMed plans reset January 1. Patients rush to use benefits before they expire.
        High volume period — but patient mix is often insurance-first.
        This window is best used for in-office optical conversion focus, not acquisition marketing.
        Premium lens upgrade messaging ('now that you're here, let's make sure your lenses match
        your life in 2026') converts well during this period.

    - name: "Back to School — Pediatric Myopia Peak"
      timing: "July – September"
      notes: >
        Parents bring children in before the school year. Myopia concern is highest here.
        Myopia management content and messaging performs best in July–August pre-deployment.
        Content frame: "Before the school year starts — is your child's myopia being managed?"
        This window is the primary enrollment period for myopia management programs.

    - name: "Year-End Benefits Use"
      timing: "September – November"
      notes: >
        Second peak for insurance benefit utilization. Similar to January — focus on conversion
        and upgrade quality rather than new patient acquisition during this period.
        Content message: "Don't let your vision benefits expire unused — and let's make sure
        you're in the right lenses this time."

    - name: "Digital Eyestrain Season"
      timing: "October – February"
      notes: >
        Screen time increases in fall and winter as days shorten and indoor time increases.
        Digital eyestrain, dry eye exacerbation, and headache from extended near work all spike.
        Content addressing these symptoms — and the specific lens and treatment options available —
        performs strongly during this window.

    - name: "Spring Allergy and Dry Eye Flare"
      timing: "March – May"
      notes: >
        Seasonal allergies drive significant ocular surface complaints.
        Many allergy-season patients are unaware that their symptoms overlap with dry eye disease.
        Content during this period that distinguishes allergy from DED and offers
        both solutions captures a highly motivated, under-treated patient segment.

# ─────────────────────────────────────────
# COMPLIANCE FLAGS
# ─────────────────────────────────────────
compliance_flags:
  - "Cannot guarantee vision outcomes. All content must use 'typically,' 'in most cases,' 'results vary' framing."
  - "Before/after or outcome descriptions require HIPAA-compliant patient consent and de-identification or explicit written release."
  - "Testimonials must be from real patients who have provided written authorization. No fabricated outcomes."
  - "Advertising as a 'specialist' in dry eye or myopia management should be accurate to training and credentialing. Verify state board rules on specialty designation language."
  - "Contact lens prescription release: federal law requires providing the prescription — content should not imply otherwise."
  - "Medical billing content must accurately reflect that medical insurance is billed for medical diagnoses — not as a workaround to vision plan limits."
  - "All promotional materials must include practice identification and comply with state optometry board advertising regulations."
  - "Myopia management: MiSight (CooperVision) and Ortho-K are FDA-cleared for myopia management — this claim is accurate and approvable. Other lens types for myopia management should be referenced carefully per current FDA guidance."
  - "Email marketing must include opt-out mechanism and practice identification in accordance with CAN-SPAM."
  - "Content comparing independent ODs favorably to corporate chains or online retailers must be factual, not disparaging. Focus on what the independent practice offers, not on attacking competitors."
