# ─────────────────────────────────────────
# SEASONAL PATTERNS
# ─────────────────────────────────────────
seasonal_patterns:
  peak_months: ["January", "February", "September", "October"]
  slow_months: ["June", "July", "November", "December"]
  
  trigger_events:
    - name: "The January Surge"
      timing: "December 26 – February 28"
      notes: "Highest new case volume of the year. Couples hold through the holidays, then act. Content and campaigns should be in market by December 15."
      
    - name: "Back to School Custody Disputes"
      timing: "August–September"
      notes: "School year changes trigger custody modification requests. Geographic moves, school selection conflicts, and schedule disputes spike."
      
    - name: "Tax Season Asset Discovery"
      timing: "February–April"
      notes: "Filing taxes reveals hidden assets, income discrepancies, and business valuations that trigger high-asset divorce inquiries."
      
    - name: "Holiday Conflict Season"
      timing: "November–December"
      notes: "Custody disputes around holidays. Modifications and enforcement actions spike. Content on 'holiday custody arrangements' performs well."

# ─────────────────────────────────────────
# COMPLIANCE FLAGS
# ─────────────────────────────────────────
compliance_flags:
  - "Cannot guarantee case outcomes. All content must use 'may', 'can', 'in our experience' framing."
  - "Testimonials must be real clients who have provided written consent. No fabricated case results."
  - "State bar advertising rules apply. Review any claims about 'best', 'top-rated', 'specialist' against local bar rules."
  - "Cannot solicit clients who are currently represented by another attorney."
  - "Email marketing to past clients is generally permissible but must include opt-out and identify the firm."
  - "Referral fee arrangements with non-attorneys are prohibited in most states. ASG's referral program designs must use non-financial incentives or attorney referral fee structures only."
  - "All educational content must include disclaimer: 'This content is for informational purposes only and does not constitute legal advice.'"
