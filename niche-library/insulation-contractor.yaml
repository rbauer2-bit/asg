    normalized_pain: "Slow periods are just part of the construction cycle. You learn to manage through them."
    urgency_blocker: "I'd rather put that money into a second spray rig than spend it on marketing I can't measure."
    trust_trigger: "Reference spray foam chemistry specifics, utility rebate programs, or energy code changes — watch the conversation shift immediately."

  authority_hooks_that_open_doors:
    - "Ask about his ratio of new construction vs. retrofit work — most don't know it, and it exposes the dependency risk"
    - "Mention that most homeowners don't know what a BPI Building Analyst is — and that's a missed positioning opportunity"
    - "Bring up IRA (Inflation Reduction Act) energy efficiency tax credits — 25C credits for insulation. Most contractors aren't using this as a closing tool."
    - "Ask whether he follows up with homeowners 90 days after a spray foam job to ask about comfort and energy bill changes"
    - "Reference local utility rebate programs by name — almost no insulation contractor leads with rebate availability in their marketing"
    - "Ask what happens to his revenue when a top builder partner takes on fewer starts"

# ─────────────────────────────────────────
# PRIORITY SERVICES (Pre-ranked by margin + volume)
# ─────────────────────────────────────────
priority_services_archetypes:
  - rank: 1
    name: "Closed Cell Spray Foam — Retrofit & Crawlspace Encapsulation"
    why_profitable: "Highest material margin, no competitor can undercut without showing up with an inferior product, homeowner has strong emotional motivation (comfort, moisture, pest exclusion)"
    ideal_avatar: "Homeowner 38–60 with an uncomfortable home, high energy bills, or a moisture problem under the floor"
    avg_value_range: "$3,500–$15,000"
    margin_notes: "Highest gross margin in the service mix when sold on outcomes (comfort, air quality, moisture) not price. Closed cell commands 30–50% premium over open cell — must be positioned correctly."

  - rank: 2
    name: "Attic Air Sealing + Blown-In Retrofit"
    why_profitable: "High volume, clear ROI story (payback in 2–5 years), rebate-eligible in most utility territories, fast execution"
    ideal_avatar: "Homeowner 35–65 paying high energy bills, particularly in climates with hot summers or cold winters. Triggered by a high bill, an energy audit, or a neighbor's recommendation."
    avg_value_range: "$1,800–$6,500"
    margin_notes: "Strong — material cost is low relative to closed cell spray foam. Labor-efficient for experienced crew. Excellent rebate-stacking potential."

  - rank: 3
    name: "New Construction Insulation Package (Builder/GC Subcontract)"
    why_profitable: "Volume and predictability; long-term builder relationships create recurring pipeline"
    ideal_avatar: "Custom home builder or production builder, 10–150+ starts/year, looking for a reliable insulation sub who won't hold up their schedule"
    avg_value_range: "$4,000–$25,000 per home"
    margin_notes: "Lower per-job margin than retrofit spray foam, but volume, predictability, and crew efficiency offset it. The dependency risk is the main liability."

  - rank: 4
    name: "Commercial / Multifamily Insulation"
    why_profitable: "Large job values, predictable scope from construction documents, long-term property management relationships possible"
    ideal_avatar: "Commercial GC, property developer, facility manager with an energy efficiency mandate"
    avg_value_range: "$15,000–$200,000+"
    margin_notes: "Lower gross margin per square foot, but scale and multi-phase project potential makes it high-value. Requires estimating capability and bonding."

  - rank: 5
    name: "Insulation Removal and Replacement"
    why_profitable: "High perceived urgency (mold, rodent damage, flood), no competitive bidding, positioned as remediation not commodity"
    ideal_avatar: "Homeowner dealing with contaminated attic insulation from rodents, mold, or fire/smoke damage"
    avg_value_range: "$2,500–$10,000"
    margin_notes: "Premium pricing is natural — this is remediation framing, not standard installation. Almost no operator markets this proactively."

