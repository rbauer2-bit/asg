# ─────────────────────────────────────────
# COMPETITIVE LANDSCAPE PATTERNS
# ─────────────────────────────────────────
competitive_landscape_patterns:
  common_competitor_weaknesses:
    - "Generic websites that say 'save on energy bills' without explaining how or why their approach is different"
    - "No explanation of open cell vs. closed cell spray foam — customers can't evaluate what they're buying"
    - "Burying certifications (BPI, manufacturer certs) in fine print instead of leading with them as authority markers"
    - "Zero educational content — no blog, no video, no answers to the questions homeowners are actually asking"
    - "No rebate or tax credit information on the website — leaving a major closing tool on the table"
    - "Reviews are thin and rarely responded to; no systematic process for collecting them"
    - "No follow-up after a completed job — no check-in on comfort, no ask for referral or review"
    - "No clear service segmentation — 'we do all insulation' with no differentiated positioning by service type"

  typical_positioning_gaps:
    - "Almost no contractor in any market leads with IRA 25C tax credit + utility rebate stacking as a positioning angle"
    - "BPI certification is barely mentioned in any market — and its meaning for the homeowner is never explained"
    - "No competitor in most markets has educational content that walks homeowners through how to evaluate an insulation quote"
    - "The 'moisture and air quality' angle is left completely open — almost everyone leads on energy cost alone"
    - "Insulation removal/replacement is almost never positioned as a standalone service — it's treated as an add-on"

  authority_gaps:
    - "Video content showing actual spray foam installation, before/after thermal imaging, or air sealing details is nearly nonexistent"
    - "No competitor in most markets has a follow-up sequence for unconverted estimates"
    - "Local SEO for 'spray foam insulation [city]' and 'crawlspace encapsulation [city]' is genuinely low-competition in most markets"
    - "No competitor has a referral program targeting HVAC contractors, home inspectors, real estate agents, or energy auditors"
    - "Google Business Profile optimization beyond basic setup is almost never done"

# ─────────────────────────────────────────
# INSIDER INTELLIGENCE — AGENCY AUTHORITY BUILDERS
# ─────────────────────────────────────────
insider_intelligence:
  # These facts, deployed in a prospect conversation, immediately
  # separate ASG from every generalist agency that has ever pitched Sam.
  authority_facts:
    - topic: "IRA 25C Tax Credit — the untapped closing tool"
      insight: "The Inflation Reduction Act extended and expanded the 25C energy efficiency tax credit through 2032. Homeowners can claim 30% of the cost of insulation upgrades (plus air sealing) up to $1,200/year. Almost no insulation contractor mentions this on their website or during the estimate. It's a $360–$1,800 reduction in net cost that changes the close rate on $3,000–$6,000 jobs significantly. Contractors who frame their quote around net-after-credit win more jobs at better margins."

    - topic: "Utility rebate stacking"
      insight: "In most utility territories, homeowners can stack a utility rebate (typically $200–$800 for attic insulation) on top of the 25C federal credit. A $4,500 attic job becomes $3,100–$3,500 net after stacking. Contractors who walk the customer through this calculation during the estimate close more deals. Most competitors either don't know about the rebates or leave it for the homeowner to figure out."

    - topic: "Thermal imaging as a conversion tool"
      insight: "A $300–$600 FLIR thermal camera is one of the highest-ROI tools in an insulation contractor's arsenal. Showing a homeowner a thermal image of their attic floor or crawlspace — with red/orange heat loss clearly visible — converts skeptics into buyers faster than any verbal explanation. Almost no small insulation contractor uses this systematically in the sales process."

    - topic: "Open cell vs. closed cell — the explanation gap"
      insight: "Most homeowners are quoted both and have no idea what the difference means. Closed cell is denser (2 lbs/ft³), has a higher R-value per inch (~6.5 vs. ~3.7), acts as a vapor barrier, and is appropriate for crawlspaces, rim joists, and conditioned spaces. Open cell is more affordable and appropriate for interior walls and attics with ventilation management. Contractors who explain this earn immediate authority over competitors who just quote a number. The explanation itself is the differentiation."

    - topic: "The air sealing multiplier"
      insight: "Up to 40% of heating and cooling loss in a typical home is through air infiltration — not insulation R-value. Air sealing (attic penetrations, rim joists, recessed lights, HVAC chases) combined with insulation delivers dramatically better performance than insulation alone. Most homeowners don't know this. Contractors who lead with 'we seal first, then insulate' deliver demonstrably better results and command a premium. This is almost never explained in competitor marketing."

    - topic: "Crawlspace encapsulation as a premium upsell"
      insight: "A full crawlspace encapsulation (liner, closed cell rim joist, conditioning or dehumidification) is a $5,000–$18,000 project that solves moisture, pest exclusion, air quality, and comfort simultaneously. It is one of the highest-ticket, highest-margin services in the residential home performance space and the conversion rate is high because the problem (mold, moisture, cold floors, musty smell) is emotionally urgent. Almost no insulation contractor markets it as a distinct premium service."

    - topic: "HVAC contractor referral network"
      insight: "HVAC technicians are in homes regularly and routinely diagnose comfort problems that are actually insulation and air sealing failures. A formal referral relationship with 3–5 HVAC companies — where they understand what to say to homeowners and know they'll get a referral back — can generate $150,000–$400,000/year in warm leads with no ad spend. Almost no insulation contractor has built this."

    - topic: "Home inspector referral pipeline"
      insight: "Home inspectors flag inadequate insulation on every inspection report where it applies. That report goes directly to the buyer AND the seller. A relationship with 5 active home inspectors generates a predictable stream of motivated, inspection-triggered leads. The homeowner calling from an inspection report has already been told by a trusted third party that they have a problem. Close rates are significantly higher than cold leads."

    - topic: "Energy code enforcement as a lead generator"
      insight: "Most municipalities have adopted IECC 2021 or similar energy codes requiring R-49–R-60 attic insulation and specific air leakage testing for new construction. Older homes coming off renovations or additions requiring permits must often meet updated code. An insulation contractor who understands local energy code requirements and can explain compliance to builders and homeowners has an authority positioning that almost no competitor has."

    - topic: "Real estate pre-sale positioning"
      insight: "Homes with documented energy efficiency upgrades (insulation, air sealing) achieve higher appraised values and sell faster in energy-conscious markets. A pre-listing insulation report from a BPI-certified contractor is a legitimate, differentiating marketing tool for real estate agents with energy-efficient listings. Real estate agent relationships generate pre-sale and post-inspection leads simultaneously."

# ─────────────────────────────────────────
# FAST CASH STRATEGY FIT RATINGS
# ─────────────────────────────────────────
fast_cash_strategy_fit:
  # Rating: high | medium | low | not-applicable

  strategy_1_wake_past_clients:
    fit: "high"
    notes: "Past attic insulation clients are candidates for crawlspace encapsulation, air sealing, and insulation removal/replacement. A reactivation sequence framed around 'how is your home performing?' with a thermal imaging audit offer generates warm appointments from an existing list with zero ad spend."

  strategy_2_raise_prices:
    fit: "high"
    notes: "Most insulation contractors are significantly underpriced relative to the value they deliver — especially on closed cell spray foam and crawlspace encapsulation. A 10–20% price increase framed around BPI certification, manufacturer warranties, and post-job documentation is immediately executable for contractors with legitimate credentials."

  strategy_3_upsell_existing:
    fit: "high"
    notes: "The estimate visit is the highest-leverage upsell moment. Attic job → crawlspace assessment → air sealing add-on → rebate consultation. Structured walkthrough checklist increases average ticket 25–50%. PHC equivalent here is the annual home performance check-in program."

  strategy_4_gift_cards:
    fit: "low"
    notes: "Not practical as a primary vehicle. Could work as 'refer a friend, they get a $200 credit toward their project' but not as a standalone fast cash lever."

  strategy_5_referrals:
    fit: "high"
    notes: "The single highest-ROI growth lever. HVAC contractors, home inspectors, real estate agents, general contractors, energy auditors, and pest control companies all encounter insulation-problem homeowners constantly. A formal referral program with clear incentives and touchpoints has near-zero cost and enormous upside. Almost no competitor has built one."

  strategy_6_flash_sales:
    fit: "medium"
    notes: "Seasonal framing works well — 'spring home comfort assessment,' 'pre-summer attic checkup,' 'winter-ready crawlspace package.' Should not be framed as discounts. Better framed as scheduled appointments at a preferred rate. Effective for filling the calendar during slow shoulder seasons."

  strategy_7_hidden_money:
    fit: "medium"
    notes: "Most insulation contractors have underpriced services, untapped IRA/rebate promotion, and unconverted estimate follow-up that could be activated immediately. A revenue audit typically finds 15–25% in unrealized revenue."

  strategy_8_subscriptions:
    fit: "medium"
    notes: "An annual 'Home Performance Check-in' program — thermal scan, air leakage test, insulation depth check — converts one-time clients into a recurring relationship and generates upsell opportunities annually. Priced at $150–$350/year, it pays for itself on the first referral generated."

  strategy_9_prepaid_packages:
    fit: "medium"
    notes: "Seasonal pre-pay packages (attic + crawlspace audit, or air sealing + blown-in) scheduled in advance improve cash flow and lock clients in before competitors can quote them."

  strategy_10_financing:
    fit: "high"
    notes: "For jobs $3,500+, financing (GreenSky, Hearth, Synchrony Home) removes the single largest close barrier. Positioned alongside the 25C tax credit, the effective monthly payment on a $6,000 spray foam crawlspace becomes very approachable. Close rate on high-ticket jobs increases measurably."

  strategy_11_partner_marketing:
    fit: "high"
    notes: "HVAC contractors, home inspectors, real estate agents, pest control companies, general contractors, and energy auditors are all natural referral partners. A single busy HVAC company referral relationship can generate $120,000–$250,000/year in warm insulation leads. Most insulation contractors have never formally approached one."

  strategy_12_bring_back_sooner:
    fit: "high"
    notes: "Post-job check-in at 60 days ('how is your home feeling? any change in comfort or energy bills?') generates testimonials, reviews, referrals, and upsell opportunities from clients who are in the peak satisfaction window. Most contractors never follow up."

  strategy_13_one_time_offer:
    fit: "medium"
    notes: "Seasonal urgency applies naturally — 'before the summer heat hits,' 'before heating season,' 'before the rebate deadline.' Home services framing makes time-limited scheduling offers appropriate and effective."

  strategy_14_sell_what_pays:
    fit: "high"
    notes: "Most contractors should aggressively market closed cell spray foam and crawlspace encapsulation — the highest-margin services. Commodity new construction batt installation should be evaluated for margin and potentially deprioritized if retrofit and spray foam work is available."

  strategy_15_teach_what_you_know:
    fit: "high"
    notes: "'How to evaluate an insulation quote,' 'what the 25C tax credit covers,' 'open cell vs. closed cell spray foam,' 'signs your attic insulation is failing' — educational content at the estimate and online positions the contractor as the home performance authority in the market. Almost all competitors produce zero educational content."

  strategy_16_keep_more_earn:
    fit: "medium"
    notes: "Job costing, crew efficiency, and chemical yield tracking (spray foam is expensive per board foot — waste is real) can improve net margin significantly without any revenue change. Most operators have no formal job costing."

  strategy_17_marketing_calendar:
    fit: "high"
    notes: "Insulation has pronounced seasonal demand patterns. Spring attic season (April–June), pre-summer comfort jobs (May–July), fall crawlspace season (September–November), winter rebate campaigns (October–December) should all be planned and in-market 4–6 weeks early."

  strategy_18_loyalty_program:
    fit: "low"
    notes: "Formal loyalty programs are awkward for a one-time-ish transaction. The annual home performance check-in program (Strategy 8) is the more appropriate version of this."

  strategy_19_local_seo:
    fit: "high"
    notes: "Google Business Profile optimization is dramatically underdone in this niche. 'Spray foam insulation [city],' 'crawlspace encapsulation [city],' 'attic insulation contractor [city]' — most markets have genuine low-competition on specific service + location terms. BPI certification as a local SEO anchor is almost entirely uncontested."

  strategy_20_bundling:
    fit: "high"
