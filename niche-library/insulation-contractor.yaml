  strategy_21_events:
    fit: "medium"
    notes: "'Free home energy audit clinic' events or lunch-and-learns for real estate agents and builders build authority and referral relationships simultaneously. Educational workshops for homeowner associations are effective in markets with older housing stock."

  strategy_22_clear_inventory:
    fit: "not-applicable"
    notes: "Service business — no inventory in the traditional sense."

  top_5_recommended:
    - strategy: 11
      name: "Partner Marketing (HVAC + Inspector + Real Estate Referral Network)"
      priority: 1
      rationale: "One busy HVAC contractor referral relationship is worth $120,000–$250,000/year in warm leads. Three relationships built and formalized is more powerful than any digital campaign. Cost: near zero. This is the fastest, highest-ROI growth lever available."

    - strategy: 10
      name: "Financing + Tax Credit Stacking (Close Rate Improvement)"
      priority: 2
      rationale: "The 25C credit + utility rebate + GreenSky/Hearth financing reduces the effective first-month cost of a $5,000 job to under $100/month after the credit is claimed. This framing, built into every estimate, increases close rate on jobs $3,500+ immediately. Requires no new marketing — just a better estimate conversation."

    - strategy: 1
      name: "Past Client Reactivation"
      priority: 3
