    billing_model: "Per-job flat fee | Square footage pricing | T&M for commercial"
    avg_job_value_range:
      residential_retrofit: "$1,800–$12,000"
      new_construction: "$3,000–$25,000"
      commercial: "$8,000–$150,000+"
    equipment_investment: "$80,000–$400,000 (spray rigs, proportioners, transfer pumps, trucks, lifts)"

  revenue_mix_typical:
    - service: "Spray foam insulation (open & closed cell)"
      revenue_share: "45–60%"
    - service: "Blown-in / loose fill (attic, wall retrofit)"
      revenue_share: "20–30%"
    - service: "Batt / roll installation (new construction)"
      revenue_share: "10–15%"
    - service: "Air sealing"
      revenue_share: "5–10%"
    - service: "Vapor / moisture barriers, radiant barriers"
      revenue_share: "3–8%"
    - service: "Insulation removal and replacement"
      revenue_share: "3–7%"

  credentials_that_matter:
    - "BPI Building Analyst or Envelope Professional (most credible for homeowner-facing authority)"
    - "RESNET HERS Rater (required for some energy code compliance jobs)"
    - "Manufacturer Certifications: Icynene, Lapolla, Demilec, Huntsman (required for warranty work)"
    - "EPA Section 608 Refrigerant certification (relevant if HVAC overlap)"
    - "State contractor license (varies — required in most states for work above certain thresholds)"
    - "General Liability $1M+ and Workers' Compensation (critical differentiator vs. uninsured subs)"
    - "Energy Star Partner or DOE Home Performance certification (strong positioning for retrofit)"

  core_frustrations:
    - "Entirely dependent on builder/GC relationships — when new construction slows, revenue collapses"
    - "Losing bids to cheaper competitors who don't explain the difference between open cell, closed cell, or why it matters"
    - "Homeowners have no idea what they're buying — they compare insulation quotes like they're buying carpet"
    - "No system to generate homeowner leads directly — 100% of pipeline comes from builders or word of mouth"
    - "Spray rigs sitting idle between commercial jobs because residential pipeline is inconsistent"
    - "Completing great energy-efficiency projects but getting zero reviews, referrals, or follow-on work"
    - "Inflation on chemical prices (polyurethane foam) compressing margins while customers resist price increases"
    - "No recurring revenue — every month starts at zero, no maintenance contracts, no follow-up system"

  marketing_history:
    - "Has been approached by generalist agencies who couldn't explain the difference between open cell and closed cell"
    - "May have tried Angi/HomeAdvisor — expensive leads, price-shoppers, low quality"
    - "Google Ads: probably tried once, spent money without a system, stopped"
    - "Reviews: 15–80 Google reviews, no consistent process for collecting them"
    - "Social media: occasional job-site photos, no educational content, no strategy"
    - "Email: no list, no automation, no follow-up sequences"
    - "Rebate programs (utility company, Energy Star): aware they exist, rarely uses them as a marketing tool"

  belief_barriers_to_hiring_asg:
    enemy_belief_primary: "Marketing agencies don't understand insulation — they'll write generic 'save on energy bills' ads that make me look like every other guy"
