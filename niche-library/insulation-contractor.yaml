# ─────────────────────────────────────────
# SEASONAL PATTERNS
# ─────────────────────────────────────────
seasonal_patterns:
  peak_months: ["April", "May", "June", "September", "October"]
  slow_months: ["January", "February", "December"]

  trigger_events:
    - name: "Pre-Summer Comfort Season"
      timing: "March–May marketing, April–July execution"
      notes: "Highest homeowner urgency period for attic insulation and air sealing. Homeowners who suffered through last summer are motivated to act before the heat returns. Campaigns should be in market by mid-March. Thermal imaging offer is particularly effective in this window."

    - name: "Pre-Heating-Season Crawlspace and Attic Retrofit"
      timing: "August–October marketing, September–November execution"
      notes: "Fall is the second peak. Crawlspace encapsulation (cold floor, moisture) and attic insulation (heating bill reduction) are the primary drivers. Content on 'get your home ready for winter' performs well. This is also the HOA / commercial budget planning window."

    - name: "Tax Season Rebate and Credit Window"
      timing: "November–February marketing, January–April execution"
      notes: "IRS 25C credit is claimed on the prior year's tax return. Homeowners who didn't act in the previous year's peak season can still capture the credit. Content and campaigns around 'it's not too late to claim the 25C credit' extend the demand curve into winter."

    - name: "Utility Rebate Deadline Campaigns"
      timing: "Varies by utility — typically Q4 and Q1"
      notes: "Many utilities run annual rebate programs with finite budgets — when the money runs out, the rebate ends. Content that creates urgency around rebate availability ('our utility's rebate pool is nearly exhausted for 2026') drives action in the shoulder season. Must be specific to the client's utility territory."

    - name: "New Construction Builder Cycle"
      timing: "January–March (permits/starts planning), April–October (peak build season)"
      notes: "Builder relationships should be nurtured in Q1 when start projections are being set. A contractor who is in front of builder partners in February when they're planning the year's pipeline locks in volume before the build season begins."

# ─────────────────────────────────────────
# COMPLIANCE FLAGS
# ─────────────────────────────────────────
compliance_flags:
  - "No professional licensing advertising rules apply (unlike legal or medical) — home services advertising is generally permissible."
  - "Cannot claim BPI or RESNET certification for individuals who do not hold current credentials. Verify certification status before including in copy."
  - "Manufacturer certifications (Icynene, Lapolla, etc.) must be current and in-market for the specific product. Verify before including in copy."
  - "25C tax credit and utility rebate claims: use 'homeowners may be eligible for' framing. Do not guarantee specific credit amounts — eligibility depends on taxpayer circumstances. Always recommend consultation with a tax professional."
  - "Spray foam health and off-gassing claims: avoid language that guarantees zero VOC or health claims that exceed manufacturer documentation. 'Fully cured spray foam is inert' is supportable. 'No health risk' is not."
  - "Outcome claims ('will reduce your energy bill by X%') should use 'homeowners typically see,' 'based on our project results,' or 'third-party energy audits show' framing. Do not guarantee specific savings."
  - "Insulation removal/mold situations: do not claim mold remediation expertise or certifications not held. Recommend licensed mold remediation contractor if active mold is present. Scope clearly as insulation removal, not remediation."
  - "HERS Ratings: if a contractor advertises RESNET HERS rating capability, the rater must be individually certified and currently registered. Verify before including in any copy."
