  age_range: "32–52"
  gender_skew: "heavily male"
  how_he_got_here: "Started as an installer or crew lead under a larger contractor or builder. Went out on his own with a spray rig and a network of GC contacts. Built steady revenue through new construction subcontracting. Now realizing that model leaves him exposed — when builders slow down, everything slows down — and he wants a real marketing system."

